<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elven Fortunes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=MedievalSharp&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:100vw;height:100vh;overflow:hidden;font-family:'MedievalSharp',cursive;background:#000;display:flex;justify-content:center;align-items:center;user-select:none}

/* ===== BACKGROUND ===== */
.bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background-image:url('img/background.png');background-size:cover;background-position:center;background-repeat:no-repeat}

/* ===== GAME LAYOUT ===== */
.game{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;width:100vw;height:100vh}

/* ===== SIDE CHARACTERS ===== */
.side{display:none}

/* ===== MAIN FRAME CONTAINER ===== */
/* Responsive: fits viewport height, capped at 500px width */
.frame-container{position:relative;
  width:min(500px, calc(100vh * 1024 / 1536), 95vw);
  z-index:2}

/* Single frame image: frame + spin bar combined (1024x1536) */
.frame-wrapper{position:relative;width:100%;aspect-ratio:1024/1536}
.frame-img{position:absolute;inset:0;
  background:url('img/frame.png') center/100% 100% no-repeat;
  z-index:1;pointer-events:none}

/* Grid area: left 14.3%, top 14.7%, width 73.6%, height 62.7% of full image */
.grid{position:absolute;left:14.3%;top:14.7%;width:73.6%;height:62.7%;
  background:transparent;border:none;overflow:hidden;padding:0;
  display:flex;align-items:stretch;justify-content:stretch;z-index:2}
/* Reels fill the entire grid area */
.reels{display:flex;gap:1px;position:relative;z-index:2;width:100%;height:100%}
.reel{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0}

/* Cells: fully responsive — no fixed px sizes */
.cell{flex:1;min-height:0;min-width:0;
  background:transparent;
  border-radius:0;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  border:none;
  transition:all .3s ease;cursor:default}
.cell .sym{width:92%;height:92%;object-fit:contain;transition:transform .2s ease}
.cell:hover .sym{transform:scale(1.1)}
/* Big symbols — use relative sizes (% of cell) */
.cell.big-anchor{overflow:visible;z-index:5}
.cell.big-part .sym{display:none}
.cell.big-anchor .sym.big2x2{width:calc(200% + 1px);height:calc(200% + 1px);position:absolute;top:0;left:0;z-index:5;
  filter:drop-shadow(0 3px 8px rgba(0,0,0,0.6))}
.cell.big-anchor .sym.big3x3{width:calc(300% + 2px);height:calc(300% + 2px);position:absolute;top:0;left:0;z-index:5;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,0.7))}
/* Big symbol decompose animation */
.cell.big-decompose .sym{animation:bigDecompose .6s ease-in forwards}
@keyframes bigDecompose{
  0%{transform:scale(1);opacity:1;filter:brightness(1)}
  40%{transform:scale(1.1);filter:brightness(1.8)}
  70%{transform:scale(0.5);opacity:.6;filter:brightness(2) blur(2px)}
  100%{transform:scale(0);opacity:0;filter:brightness(3) blur(4px)}
}
.cell.big-appear{animation:bigAppear .5s cubic-bezier(.22,.68,.36,1.2)}
@keyframes bigAppear{
  0%{transform:scale(0);opacity:0}
  60%{transform:scale(1.15);opacity:1}
  100%{transform:scale(1);opacity:1}
}

/* Winning pulse - slow golden glow */
.cell.winning{animation:winPulse .7s ease-in-out infinite alternate;
  border:2px solid rgba(255,215,0,0.9);border-radius:0;
  box-shadow:0 0 30px rgba(255,215,0,0.7),0 0 60px rgba(255,165,0,0.3),inset 0 0 20px rgba(255,215,0,0.2);
  background:radial-gradient(circle,rgba(60,50,0,0.95),rgba(20,15,0,0.98))}
@keyframes winPulse{
  0%{transform:scale(1);box-shadow:0 0 30px rgba(255,215,0,0.7),0 0 60px rgba(255,165,0,0.3)}
  100%{transform:scale(1.08);box-shadow:0 0 45px rgba(255,215,0,0.9),0 0 90px rgba(255,165,0,0.5)}
}

/* Explode - dramatic burst */
.cell.explode{animation:explode .8s ease-out forwards}
@keyframes explode{
  0%{transform:scale(1);opacity:1;filter:brightness(1)}
  15%{transform:scale(1.2);opacity:1;filter:brightness(2)}
  30%{transform:scale(1.35) rotate(8deg);opacity:.9;filter:brightness(2.5) saturate(2)}
  50%{transform:scale(1.5) rotate(-5deg);opacity:.5;filter:brightness(3) saturate(1.5)}
  70%{transform:scale(1.2) rotate(12deg);opacity:.2;filter:brightness(4)}
  100%{transform:scale(0) rotate(30deg);opacity:0;filter:brightness(5)}
}

/* Drop - bouncy fall from top (responsive: use % instead of px) */
.cell.drop{animation:dropIn .7s cubic-bezier(.22,.68,.36,1.2)}
@keyframes dropIn{
  0%{transform:translateY(-150%) scale(0.8);opacity:0}
  40%{transform:translateY(12%) scale(1.05);opacity:1}
  60%{transform:translateY(-10%) scale(0.97)}
  80%{transform:translateY(5%) scale(1.02)}
  100%{transform:translateY(0) scale(1)}
}

/* Dissolve - soft magical fade for non-cluster matching symbols */
.cell.dissolve{animation:dissolve .9s ease-out forwards}
@keyframes dissolve{
  0%{transform:scale(1);opacity:1;filter:brightness(1) blur(0)}
  25%{transform:scale(1.05);opacity:.8;filter:brightness(1.8) blur(0)}
  50%{transform:scale(1.02);opacity:.5;filter:brightness(2) blur(2px)}
  75%{transform:scale(0.95);opacity:.2;filter:brightness(2.5) blur(4px)}
  100%{transform:scale(0.85);opacity:0;filter:brightness(3) blur(6px)}
}

/* Wild spawn - epic golden entrance */
.cell.wild-spawn{animation:wildSpawn 1s ease-out forwards}
.cell.wild-spawn .sym{animation:wildGlow 1s ease-out forwards}
@keyframes wildSpawn{
  0%{transform:scale(0) rotate(-360deg);opacity:0;box-shadow:0 0 0 rgba(255,215,0,0)}
  25%{transform:scale(1.5) rotate(-30deg);opacity:1;box-shadow:0 0 60px rgba(255,215,0,1),0 0 120px rgba(255,165,0,0.6)}
  50%{transform:scale(0.85) rotate(15deg);opacity:1;box-shadow:0 0 40px rgba(255,215,0,0.7),0 0 80px rgba(255,165,0,0.4)}
  70%{transform:scale(1.15) rotate(-5deg);box-shadow:0 0 50px rgba(255,215,0,0.8)}
  85%{transform:scale(0.95) rotate(2deg);box-shadow:0 0 30px rgba(255,215,0,0.5)}
  100%{transform:scale(1) rotate(0deg);box-shadow:0 0 20px rgba(255,215,0,0.4)}
}
@keyframes wildGlow{
  0%{filter:brightness(0) drop-shadow(0 0 0 transparent)}
  20%{filter:brightness(5) drop-shadow(0 0 30px rgba(255,215,0,1))}
  50%{filter:brightness(2) drop-shadow(0 0 20px rgba(255,215,0,0.8))}
  100%{filter:brightness(1) drop-shadow(0 0 10px rgba(255,215,0,0.5))}
}

.cell.spinning .sym{animation:spinBlur .07s linear infinite}
@keyframes spinBlur{0%{transform:translateY(-110%);opacity:.2}50%{opacity:.5}100%{transform:translateY(110%);opacity:.2}}

/* ===== TITLE BANNER (hidden - frame image has built-in title) ===== */
.title-wrap{display:none}

/* ===== PAYTABLE POPUP ===== */
.paytable-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:50000;
  justify-content:center;align-items:center;backdrop-filter:blur(4px)}
.paytable-overlay.show{display:flex}
.paytable-box{background:linear-gradient(180deg,#1a1a2e,#0d0d1a);border:2px solid #FFD700;border-radius:16px;
  padding:20px 24px;max-width:720px;width:95%;max-height:90vh;overflow-y:auto;position:relative;
  box-shadow:0 0 60px rgba(255,215,0,0.2)}
.paytable-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#FFD700;
  font-size:24px;cursor:pointer;z-index:1;line-height:1}
.paytable-close:hover{color:#fff}
.paytable-title{text-align:center;font-family:'Cinzel Decorative',cursive;font-size:20px;font-weight:900;
  color:#FFD700;margin-bottom:16px;text-shadow:0 0 15px rgba(255,215,0,0.4)}
.paytable-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:600px){.paytable-grid{grid-template-columns:repeat(2,1fr)}}
.paytable-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,215,0,0.2);border-radius:10px;
  padding:10px;text-align:center}
.paytable-card img{width:64px;height:64px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.6));
  margin-bottom:6px}
.paytable-card .sym-name{color:#FFD700;font-family:'MedievalSharp',cursive;font-size:11px;margin-bottom:6px;
  font-weight:bold}
.paytable-row{display:flex;justify-content:space-between;align-items:center;padding:2px 4px;
  font-size:10px;border-bottom:1px solid rgba(255,255,255,0.05)}
.paytable-row:last-child{border-bottom:none}
.paytable-row .tier{color:#aaa;font-weight:bold;min-width:32px}
.paytable-row .payout{color:#4dff88;font-weight:bold}
.paytable-btn{position:fixed;top:10px;left:10px;z-index:10000;background:linear-gradient(145deg,#1a1a2e,#0d0d1a);
  border:2px solid #FFD700;color:#FFD700;padding:6px 14px;border-radius:8px;cursor:pointer;
  font-family:'MedievalSharp',cursive;font-size:12px;font-weight:bold;
  box-shadow:0 2px 10px rgba(255,215,0,0.3);transition:all .2s}
.paytable-btn:hover{background:#FFD700;color:#000}

/* ===== CHARGE BAR (VERTICAL) ===== */
.charge-bar{position:relative;width:32px;height:100%;
  background:linear-gradient(180deg,#0a0514,#0d0820,#0a0514);
  border-radius:16px;border:2px solid #4a3a7a;overflow:visible;
  box-shadow:inset 0 0 12px rgba(0,0,0,0.9),0 0 8px rgba(100,60,180,0.3),0 0 20px rgba(80,40,160,0.15);
  z-index:3}
.charge-bar::before{content:'';position:absolute;top:2px;left:4px;width:8px;bottom:2px;
  background:linear-gradient(180deg,rgba(255,255,255,0.06),transparent 40%,rgba(255,255,255,0.03));
  border-radius:12px;pointer-events:none;z-index:4}
.charge-fill{position:absolute;bottom:0;left:0;right:0;height:0%;border-radius:0 0 14px 14px;
  background:linear-gradient(0deg,#3a0080,#6622cc,#9944ff,#bb66ff);
  box-shadow:0 0 15px rgba(120,60,220,0.6),0 0 30px rgba(100,40,200,0.3),inset 0 0 8px rgba(255,200,255,0.2);
  transition:height 0.6s cubic-bezier(.25,.8,.25,1)}
.charge-fill::after{content:'';position:absolute;top:0;left:3px;right:12px;height:100%;
  background:linear-gradient(90deg,rgba(255,255,255,0.2),transparent);border-radius:14px;pointer-events:none}
/* Glow ring at fill top */
.charge-fill::before{content:'';position:absolute;top:-3px;left:-2px;right:-2px;height:6px;
  background:radial-gradient(ellipse at center,rgba(200,150,255,0.9),rgba(120,60,220,0.4),transparent);
  border-radius:50%;filter:blur(2px);pointer-events:none}
/* Threshold markers - horizontal lines across the bar */
.charge-mark{position:absolute;left:0;right:0;height:3px;transform:translateY(50%);
  background:rgba(80,60,120,0.5);z-index:5;transition:all .4s ease}
.charge-mark::after{content:attr(data-label);position:absolute;left:calc(100% + 6px);top:50%;transform:translateY(-50%);
  font-size:8px;font-weight:900;font-family:'Cinzel Decorative',cursive;
  color:rgba(150,120,200,0.5);white-space:nowrap;transition:all .4s ease;
  text-shadow:0 0 4px rgba(0,0,0,0.8)}
/* Gem icons on threshold markers */
.charge-mark::before{content:'';position:absolute;right:calc(100% + 4px);top:50%;transform:translateY(-50%);
  width:12px;height:12px;border-radius:3px;rotate:45deg;
  background:linear-gradient(135deg,#555,#333);border:1.5px solid #6a5a9a;
  transition:all .4s ease;box-shadow:0 1px 4px rgba(0,0,0,0.6)}
/* Threshold 1 = green (30) */
#cm1.reached{background:rgba(0,220,80,0.9);box-shadow:0 0 10px rgba(0,220,80,0.5)}
#cm1.reached::before{background:linear-gradient(135deg,#44ff88,#00cc44);border-color:#44ff88;
  box-shadow:0 0 12px rgba(0,220,80,0.9),0 0 20px rgba(0,180,60,0.4);animation:gemPop .5s ease-out}
#cm1.reached::after{color:#44ff88;text-shadow:0 0 8px rgba(0,220,80,0.6)}
/* Threshold 2 = blue (60) */
#cm2.reached{background:rgba(50,150,255,0.9);box-shadow:0 0 10px rgba(50,150,255,0.5)}
#cm2.reached::before{background:linear-gradient(135deg,#66bbff,#2288ee);border-color:#66bbff;
  box-shadow:0 0 12px rgba(50,150,255,0.9),0 0 20px rgba(30,100,220,0.4);animation:gemPop .5s ease-out}
#cm2.reached::after{color:#66bbff;text-shadow:0 0 8px rgba(50,150,255,0.6)}
/* Threshold 3 = purple (90) */
#cm3.reached{background:rgba(180,80,255,0.9);box-shadow:0 0 10px rgba(180,80,255,0.5)}
#cm3.reached::before{background:linear-gradient(135deg,#cc88ff,#9944ee);border-color:#cc88ff;
  box-shadow:0 0 12px rgba(180,80,255,0.9),0 0 20px rgba(140,40,220,0.4);animation:gemPop .5s ease-out}
#cm3.reached::after{color:#cc88ff;text-shadow:0 0 8px rgba(180,80,255,0.6)}
/* Threshold 4 = red/gold (120) */
#cm4.reached{background:rgba(255,60,30,0.9);box-shadow:0 0 10px rgba(255,60,30,0.5)}
#cm4.reached::before{background:linear-gradient(135deg,#ff6644,#ee2200);border-color:#ff6644;
  box-shadow:0 0 12px rgba(255,60,30,0.9),0 0 20px rgba(220,30,0,0.4);animation:gemPop .5s ease-out}
#cm4.reached::after{color:#ff6644;text-shadow:0 0 8px rgba(255,60,30,0.6)}
@keyframes gemPop{0%{transform:translateY(-50%) rotate(45deg) scale(1)}40%{transform:translateY(-50%) rotate(45deg) scale(1.8)}100%{transform:translateY(-50%) rotate(45deg) scale(1)}}
/* Charge text label at bottom */
.charge-label{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);
  font-size:9px;font-weight:900;color:rgba(180,150,230,0.9);z-index:6;white-space:nowrap;
  font-family:'Cinzel Decorative',cursive;
  text-shadow:0 0 6px rgba(120,60,220,0.5),0 1px 2px rgba(0,0,0,0.9)}
/* Ambient particles on full bar */
@keyframes chargeParticle{0%{opacity:0;transform:translateY(0) scale(0)}50%{opacity:1;transform:translateY(-10px) scale(1)}100%{opacity:0;transform:translateY(-25px) scale(0.5)}}
.charge-bar.full .charge-fill{background:linear-gradient(0deg,#cc0000,#ff4400,#FFD700,#ffee66);
  box-shadow:0 0 20px rgba(255,100,0,0.7),0 0 40px rgba(255,60,0,0.4),inset 0 0 10px rgba(255,200,100,0.3)}

/* ===== SPIN BAR (integrated in frame image) ===== */
/* All spin bar elements are positioned absolutely within .frame-wrapper */
/* Image: 1024x1536. Spin bar area: roughly y=1190-1500 (77.5%-97.7%) */

.sb-num{position:absolute;font-family:'Cinzel Decorative',cursive;font-weight:900;
  color:#3a2a0a;text-shadow:none;
  pointer-events:none;user-select:none;white-space:nowrap;display:flex;
  align-items:center;justify-content:center;z-index:3;
  background:rgb(217,175,57);border-radius:2px}
/* Drag mode: visible overlays */
.sb-num.draggable{pointer-events:auto;cursor:move;
  outline:2px solid #ff0000 !important;outline-offset:1px;
  z-index:9999 !important}
.sb-click.draggable{
  outline:3px solid #00ffff !important;outline-offset:2px;
  background:rgba(0,255,255,0.4) !important;
  z-index:9998 !important}
.sb-click.draggable::after{content:attr(title);color:#000;font:bold 10px sans-serif;
  display:flex;align-items:center;justify-content:center;width:100%;height:100%}
/* Resize handles on draggable overlays */
.ov-handle{position:absolute;background:#ff0;border:1px solid #000;z-index:10001;pointer-events:auto;display:none}
.ov-handle-e{width:6px;height:60%;top:20%;right:-4px;cursor:ew-resize}
.ov-handle-s{height:6px;width:60%;left:20%;bottom:-4px;cursor:ns-resize}
.ov-handle-se{width:8px;height:8px;right:-5px;bottom:-5px;cursor:nwse-resize;border-radius:2px}
.draggable .ov-handle{display:block}

/* SALDO value */
.sb-num-bal{font-size:10px;left:14%;top:81%;width:14%;height:2.8%}
/* VINCITE box 1 */
.sb-num-vin1{font-size:8px;left:6%;top:90%;width:13%;height:2.2%}
/* VINCITE box 2 */
.sb-num-vin2{font-size:8px;left:23%;top:90%;width:12%;height:2.2%}
/* VINCITE TOTALI right */
.sb-num-win{font-size:10px;left:67%;top:81%;width:19%;height:2.2%}

/* Invisible clickable zones within frame-wrapper */
.sb-click{position:absolute;cursor:pointer;border:none;background:transparent;z-index:5}
.sb-click:hover{filter:brightness(1.2)}
.sb-click:active{transform:scale(0.95)}
/* MAX BET button */
.sb-click-maxbet{left:34.7%;top:78.5%;width:8.3%;height:4.6%;cursor:pointer;border-radius:50%}
/* Bet minus (-) */
.sb-click-betdown{left:58.6%;top:80.1%;width:5.9%;height:2.9%;cursor:pointer;border-radius:50%}
/* Bet plus (+) */
.sb-click-betup{left:91.3%;top:80.4%;width:4.9%;height:2.8%;cursor:pointer;border-radius:50%}
/* SPIN button (large golden coin) */
.sb-click-spin{left:37.1%;top:84.3%;width:28.3%;height:11.7%;border-radius:50%;cursor:pointer}
.sb-click-spin:hover{filter:brightness(1.15) drop-shadow(0 0 12px rgba(255,215,0,0.6))}
.sb-click-spin:active{transform:scale(0.93)}
.frame-wrapper.disabled .sb-click-spin{opacity:.4;cursor:not-allowed;pointer-events:none}

/* ===== BONUS MENU (right side vertical panel) ===== */
.buy-menu{position:absolute;top:15%;right:1.5%;z-index:20;width:10%;
  display:flex;flex-direction:column;align-items:stretch;gap:4px;padding:0}
.buy-btn{position:relative;z-index:1;width:100%;
  background:linear-gradient(180deg,#1a0e2e,#0d0820);
  border:1.5px solid #4a3a7a;border-radius:8px;cursor:pointer;transition:all .25s ease;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6px 3px;gap:1px;
  box-shadow:0 2px 8px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.05)}
.buy-btn .buy-icon{font-size:16px;line-height:1;filter:drop-shadow(0 0 4px rgba(255,215,0,0.4))}
.buy-btn .buy-name{font-family:'MedievalSharp',cursive;font-size:7px;font-weight:bold;
  color:#ccc;text-shadow:0 1px 2px #000;white-space:nowrap;line-height:1.1}
.buy-btn .buy-cost{font-family:'Cinzel Decorative',cursive;font-size:9px;font-weight:900;
  color:#FFD700;text-shadow:0 0 6px rgba(255,215,0,0.5);line-height:1.1}
.buy-btn:hover:not(:disabled){transform:scale(1.06);border-color:#FFD700;
  box-shadow:0 0 15px rgba(255,215,0,0.3),0 4px 12px rgba(0,0,0,0.5);
  background:linear-gradient(180deg,#2a1e4e,#1a1040)}
.buy-btn:active:not(:disabled){transform:scale(0.95)}
.buy-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;filter:grayscale(0.5)}
/* Color accents per button */
.buy-btn[data-buy="findBonus"]{border-color:#2a7a3a}
.buy-btn[data-buy="findBonus"]:hover:not(:disabled){border-color:#44ff88;box-shadow:0 0 12px rgba(0,220,80,0.4)}
.buy-btn[data-buy="removeSymbols"]{border-color:#2a5a8a}
.buy-btn[data-buy="removeSymbols"]:hover:not(:disabled){border-color:#44bbff;box-shadow:0 0 12px rgba(0,160,255,0.4)}
.buy-btn[data-buy="bigSymbols"]{border-color:#5a3a8a}
.buy-btn[data-buy="bigSymbols"]:hover:not(:disabled){border-color:#cc88ff;box-shadow:0 0 12px rgba(180,80,255,0.4)}
.buy-btn[data-buy="fireballs"]{border-color:#8a4a1a}
.buy-btn[data-buy="fireballs"]:hover:not(:disabled){border-color:#ff8833;box-shadow:0 0 12px rgba(255,120,0,0.4)}
.buy-btn[data-buy="buyFSFull"]{border-color:#7a2a5a}
.buy-btn[data-buy="buyFSFull"]:hover:not(:disabled){border-color:#ff44cc;box-shadow:0 0 12px rgba(255,60,200,0.4)}
.buy-btn[data-buy="buyFSAuto"]{border-color:#8a6a1a}
.buy-btn[data-buy="buyFSAuto"]:hover:not(:disabled){border-color:#FFD700;box-shadow:0 0 15px rgba(255,215,0,0.5)}

/* ===== SPEED BOOST BUTTONS ===== */
.speed-panel{position:absolute;bottom:3%;right:1.5%;z-index:20;
  display:flex;gap:3px;align-items:center}
.speed-btn{background:linear-gradient(180deg,#1a1a2e,#0d0d1a);
  border:1.5px solid #444;border-radius:6px;cursor:pointer;
  color:#aaa;font-family:'Cinzel Decorative',cursive;font-size:10px;font-weight:900;
  padding:4px 7px;transition:all .2s ease;
  box-shadow:0 2px 6px rgba(0,0,0,0.4)}
.speed-btn:hover{border-color:#FFD700;color:#FFD700;box-shadow:0 0 10px rgba(255,215,0,0.3)}
.speed-btn.active{background:linear-gradient(180deg,#2a1a00,#1a1000);
  border-color:#FFD700;color:#FFD700;
  box-shadow:0 0 12px rgba(255,215,0,0.4),inset 0 0 6px rgba(255,215,0,0.1);
  text-shadow:0 0 6px rgba(255,215,0,0.5)}

/* ===== FREE SPINS BANNER ===== */
.fs{display:none;position:absolute;top:-30px;left:50%;transform:translateX(-50%);
  background:linear-gradient(145deg,#8B0000,#CC0000);color:#FFD700;padding:5px 18px;border-radius:15px;
  font-size:13px;font-weight:bold;border:2px solid #FFD700;white-space:nowrap;z-index:20;
  box-shadow:0 0 20px rgba(255,0,0,0.4),0 4px 10px rgba(0,0,0,0.5)}
.fs.show{display:block;animation:popIn .3s ease-out}

/* ===== WIN BANNER ===== */
.banner{display:none;position:absolute;top:46%;left:51%;transform:translate(-50%,-50%);
  background:radial-gradient(ellipse,rgba(0,40,0,0.97),rgba(0,15,0,0.99));
  border:3px solid #FFD700;border-radius:20px;padding:30px 60px;z-index:100;text-align:center;
  box-shadow:0 0 80px rgba(255,215,0,0.4),0 0 120px rgba(0,80,0,0.3);
  white-space:nowrap}
.banner.show{display:flex;flex-direction:column;align-items:center;animation:popIn .5s ease-out}
.banner h2{font-family:'Cinzel Decorative',cursive;font-size:28px;color:#FFD700;text-shadow:0 0 20px rgba(255,215,0,0.5);margin-bottom:10px}
.banner p{color:#90EE90;font-size:18px}
@keyframes popIn{from{transform:translate(-50%,-50%) scale(0);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}

.win-pop{position:absolute;top:14.7%;left:14.3%;width:73.6%;height:62.7%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel Decorative',cursive;font-size:0;color:#FFD700;
  text-shadow:0 0 30px rgba(255,215,0,0.8),0 0 60px rgba(255,165,0,0.4);z-index:50;white-space:nowrap;transition:font-size .3s ease;pointer-events:none}
.win-pop.show{font-size:24px;animation:winB .5s ease-out}
@keyframes winB{0%{transform:scale(0)}60%{transform:scale(1.4)}100%{transform:scale(1)}}

/* ===== PARTICLES ===== */
.ptcl{position:fixed;pointer-events:none;z-index:200;animation:ptclFall 2s ease-in forwards}
@keyframes ptclFall{0%{opacity:1;transform:translateY(0) rotate(0) scale(1)}100%{opacity:0;transform:translateY(350px) rotate(720deg) scale(0)}}
.coin-rain{position:fixed;pointer-events:none;z-index:150;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#FFE44D,#DAA520);
  box-shadow:inset -2px -2px 4px rgba(0,0,0,0.3),0 0 8px rgba(255,215,0,0.5);
  animation:coinFall 1.5s ease-in forwards}
@keyframes coinFall{0%{opacity:1;transform:translateY(-50px) rotateX(0)}50%{transform:translateY(40vh) rotateX(900deg)}100%{opacity:0;transform:translateY(100vh) rotateX(1800deg)}}

/* ===== CHARGE NUMBER POPUP (covers grid + frame exactly) ===== */
.charge-popup{position:absolute;inset:0;
  z-index:100;pointer-events:none;text-align:center;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,rgba(0,0,0,0.5),transparent 70%)}
.charge-popup-num.text{font-size:36px}
.charge-popup-num{font-family:'Cinzel Decorative',cursive;font-size:80px;font-weight:900;
  background:linear-gradient(180deg,#FFE44D,#FFD700,#FF8C00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 4px 15px rgba(255,165,0,0.8)) drop-shadow(0 0 40px rgba(255,215,0,0.5));
  animation:numPop 1.2s ease-out forwards}
.charge-popup-label{font-family:'MedievalSharp',cursive;font-size:16px;color:#FFD700;
  text-shadow:0 2px 8px rgba(0,0,0,0.8);margin-top:-10px;
  animation:numFadeIn .6s ease-out .3s both}
@keyframes numPop{
  0%{transform:scale(0) rotate(-20deg);opacity:0}
  30%{transform:scale(1.4) rotate(5deg);opacity:1}
  50%{transform:scale(0.9) rotate(-3deg)}
  65%{transform:scale(1.1) rotate(1deg)}
  80%{transform:scale(1) rotate(0deg)}
  100%{transform:scale(1) rotate(0deg);opacity:1}
}
@keyframes numFadeIn{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
@keyframes numFadeOut{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0.5)}}

/* ===== FIREBALL ===== */
.fireball{position:absolute;width:36px;height:36px;border-radius:50%;z-index:120;pointer-events:none;
  background:radial-gradient(circle at 45% 40%,#fff,#FFEE60 15%,#FFB020 35%,#FF6000 55%,#DD2000 75%,#600 100%);
  box-shadow:0 0 25px rgba(255,120,0,1),0 0 50px rgba(255,60,0,0.8),0 0 80px rgba(255,30,0,0.4),0 0 120px rgba(200,0,0,0.2);
  animation:fireGlow .12s ease-in-out infinite alternate}
/* Fire tail/trail */
.fireball::before{content:'';position:absolute;top:-20px;left:6px;width:24px;height:40px;
  background:linear-gradient(180deg,transparent,rgba(255,100,0,0.1),rgba(255,60,0,0.4),rgba(255,200,50,0.6));
  border-radius:50% 50% 40% 40%;filter:blur(4px);animation:tailFlicker .08s ease-in-out infinite alternate}
/* Inner glow */
.fireball::after{content:'';position:absolute;top:-10px;left:-4px;width:44px;height:44px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,220,80,0.5),rgba(255,100,0,0.2) 50%,transparent 70%);
  animation:fireFlicker .1s ease-in-out infinite alternate}
@keyframes fireGlow{
  0%{box-shadow:0 0 20px rgba(255,120,0,0.9),0 0 40px rgba(255,60,0,0.6),0 0 70px rgba(255,30,0,0.3);transform:scale(0.95)}
  100%{box-shadow:0 0 30px rgba(255,120,0,1),0 0 60px rgba(255,60,0,0.8),0 0 100px rgba(255,30,0,0.4);transform:scale(1.05)}}
@keyframes fireFlicker{0%{transform:scale(0.85);opacity:.5}100%{transform:scale(1.15);opacity:.9}}
@keyframes tailFlicker{0%{opacity:.6;height:35px}100%{opacity:.9;height:45px}}
@keyframes fbMultiFloat{0%{opacity:1;transform:translateY(0) scale(1)}30%{transform:translateY(-15px) scale(1.3)}100%{opacity:0;transform:translateY(-60px) scale(0.8)}}
/* Impact crater effect */
.fire-crater{position:absolute;border-radius:50%;z-index:115;pointer-events:none;
  background:radial-gradient(circle,rgba(255,200,50,0.6),rgba(255,100,0,0.3) 40%,transparent 70%);
  animation:craterExpand .6s ease-out forwards}
@keyframes craterExpand{
  0%{width:0;height:0;opacity:1}
  50%{width:120px;height:120px;opacity:.7}
  100%{width:160px;height:160px;opacity:0}}
/* Cell on meteor impact - engulfed in flames */
.cell.fire-impact{animation:fireImpact 1s ease-out;animation-fill-mode:none;position:relative;overflow:visible}
.cell.fire-impact::before{content:'';position:absolute;inset:-12px;z-index:10;pointer-events:none;
  background:radial-gradient(ellipse at 50% 70%,rgba(255,220,50,0.8),rgba(255,80,0,0.6) 40%,rgba(200,0,0,0.3) 70%,transparent);
  animation:impactFlames 1s ease-out forwards}
.cell.fire-impact::after{content:'';position:absolute;left:5%;right:5%;bottom:-5px;height:140%;z-index:11;pointer-events:none;
  background:linear-gradient(0deg,rgba(255,255,100,0.7),rgba(255,160,0,0.6) 25%,rgba(255,60,0,0.4) 50%,rgba(200,0,0,0.2) 75%,transparent);
  border-radius:40% 40% 0 0;filter:blur(2px);
  animation:flamesFlicker .12s ease-in-out infinite alternate, impactFlamesFade 1s ease-out forwards}
@keyframes fireImpact{
  0%{filter:brightness(1);transform:scale(1)}
  8%{filter:brightness(6) saturate(3);transform:scale(1.2) rotate(2deg);box-shadow:0 0 50px rgba(255,100,0,1),0 0 100px rgba(255,50,0,0.7)}
  20%{filter:brightness(4) saturate(2);transform:scale(0.88) rotate(-3deg)}
  35%{filter:brightness(3);transform:scale(1.06) rotate(1deg);box-shadow:0 0 35px rgba(255,80,0,0.8)}
  50%{filter:brightness(2.5) saturate(1.5);transform:scale(0.97) rotate(-1deg)}
  70%{filter:brightness(1.5);transform:scale(1.01)}
  100%{filter:brightness(1);transform:scale(1);box-shadow:none}}
@keyframes impactFlames{
  0%{opacity:0;transform:scale(0.5)}
  15%{opacity:1;transform:scale(1.3)}
  40%{opacity:.9;transform:scale(1.1)}
  100%{opacity:0;transform:scale(0.8)}}
@keyframes impactFlamesFade{0%{opacity:0}10%{opacity:1}50%{opacity:.8}100%{opacity:0}}
/* Adjacent cells catching fire - real flames */
.cell.fire-spread{animation:fireSpread 1.2s ease-out;animation-fill-mode:none;position:relative;overflow:visible}
.cell.fire-spread::before{content:'';position:absolute;inset:-8px;z-index:10;pointer-events:none;
  background:radial-gradient(ellipse at 50% 80%,rgba(255,60,0,0.7),rgba(255,120,0,0.4) 40%,transparent 70%);
  animation:flamesUp 1.2s ease-out forwards}
.cell.fire-spread::after{content:'';position:absolute;left:10%;right:10%;bottom:0;height:120%;z-index:11;pointer-events:none;
  background:linear-gradient(0deg,rgba(255,200,0,0.6),rgba(255,100,0,0.5) 30%,rgba(255,50,0,0.3) 60%,transparent);
  border-radius:50% 50% 0 0;filter:blur(3px);
  animation:flamesFlicker .15s ease-in-out infinite alternate, flamesFade 1.2s ease-out forwards}
@keyframes fireSpread{
  0%{filter:brightness(1);transform:scale(1)}
  15%{filter:brightness(2) saturate(3) hue-rotate(-10deg);transform:scale(1.08);box-shadow:0 0 40px rgba(255,60,0,0.9),0 0 80px rgba(255,30,0,0.4)}
  40%{filter:brightness(2.5) saturate(2) hue-rotate(-5deg);transform:scale(1.02);box-shadow:0 0 30px rgba(255,80,0,0.7)}
  70%{filter:brightness(1.5) saturate(1.3);box-shadow:0 0 15px rgba(255,120,0,0.4)}
  100%{filter:brightness(1);transform:scale(1);box-shadow:none}}
@keyframes flamesUp{
  0%{opacity:0;transform:scaleY(0.3)}
  20%{opacity:1;transform:scaleY(1.2)}
  50%{opacity:.8;transform:scaleY(1)}
  100%{opacity:0;transform:scaleY(0.5)}}
@keyframes flamesFlicker{0%{transform:scaleX(0.9) scaleY(0.95)}100%{transform:scaleX(1.1) scaleY(1.05)}}
@keyframes flamesFade{0%{opacity:0}15%{opacity:1}60%{opacity:.7}100%{opacity:0}}

@keyframes frameShake{
  0%{transform:translate(0,0)}
  15%{transform:translate(-4px,3px)}
  30%{transform:translate(3px,-2px)}
  45%{transform:translate(-2px,2px)}
  60%{transform:translate(2px,-1px)}
  75%{transform:translate(-1px,1px)}
  100%{transform:translate(0,0)}}
.grid-shake{animation:frameShake .4s ease-out;animation-fill-mode:none}
</style>
</head>
<body>

<!-- ===== BACKGROUND: Irish landscape ===== -->
<div class="bg"></div>

<!-- ===== GAME CONTAINER ===== -->

<!-- ===== LEPRECHAUN (Left) ===== -->

<img src="img/leprechaun.png" draggable="false">
</div>

<!-- ===== MAIN SLOT FRAME ===== -->
<div class="frame-container" id="frame">
  <div class="frame-wrapper" id="frameWrap">

    <!-- Grid positioned over the cell area -->

    <!-- Free spins banner -->

    <!-- Win overlays -->
    <div class="win-pop" id="winPop"></div>

    <div class="sb-num sb-num-win"><span id="winV">0.00</span><div class="ov-handle ov-handle-e"></div><div class="ov-handle ov-handle-s"></div><div class="ov-handle ov-handle-se"></div></div>

    <!-- Spin bar clickable zones -->

  <!-- Bonus menu on right -->

<script>
// ===== SYMBOLS - 3D Irish Theme =====
const IMG=p=>`<img src="img/${p}.png" style="width:100%;height:100%;object-fit:contain" draggable="false">`;
// Tiers: [5, 6, 7, 8, 9-11, 12-14, 15+]
const TIER_LABELS=['5','6','7','8','9-11','12-14','15+'];
const S = {
  potOfGold:   { name:'Pentola d\'Oro', t:'p', img:'potOfGold',   tiers:[1.00, 1.50, 2.50, 5.00, 10.00, 25.00, 100.00], svg:IMG('potOfGold') },
  greenAcorn:  { name:'Ghianda Verde',  t:'m', img:'greenAcorn',  tiers:[0.50, 0.75, 1.25, 2.50,  5.00, 12.50,  50.00], svg:IMG('greenAcorn') },
  crystalBell: { name:'Campana Vetro',  t:'p', img:'crystalBell', tiers:[0.30, 0.50, 0.75, 1.50,  3.00,  7.50,  30.00], svg:IMG('crystalBell') },
  redMushroom: { name:'Fungo Rosso',    t:'m', img:'redMushroom', tiers:[0.25, 0.30, 0.50, 0.80,  2.00,  5.00,  15.00], svg:IMG('redMushroom') },
  blueMushroom:{ name:'Fungo Blu',      t:'m', img:'blueMushroom',tiers:[0.20, 0.25, 0.40, 0.60,  1.00,  2.50,  10.00], svg:IMG('blueMushroom') },
  celticKnot:  { name:'Medaglione',     t:'p', img:'celticKnot',  tiers:[0.10, 0.15, 0.20, 0.30,  0.50,  1.50,   5.00], svg:IMG('celticKnot') },
  wild:        { name:'WILD',           t:'w', img:'wild',        tiers:[0,0,0,0,0,0,0], svg:IMG('wild') },
  scatter:     { name:'BONUS',          t:'s', img:'bonus',       tiers:[0,0,0,0,0,0,0], svg:IMG('bonus') }
};

// Get tier index from cluster size
function getTierIdx(size){
  if(size>=15)return 6;
  if(size>=12)return 5;
  if(size>=9)return 4;
  if(size===8)return 3;
  if(size===7)return 2;
  if(size===6)return 1;
  if(size===5)return 0;
  return -1;
}

// ===== GAME CONFIG =====
const COLS=6, ROWS=8;
let grid=[], balance=5000, bet=1, totalWin=0, isSpinning=false, freeSpins=0, inFS=false, chargePoints=0, chargeMulti=1, fireballMulti=1, removeSymMulti=1;

function pickFireballMulti(){
  const ms=CFG.fireballMultis;
  const totalW=ms.reduce((a,m)=>a+m.w,0);
  let rn=Math.random()*totalW, cum=0;
  for(const m of ms){cum+=m.w;if(rn<cum)return m.v;}
  return ms[0].v;
}
function pickFireballCount(){
  const cs=CFG.fireballCounts.filter(c=>c.w>0);
  if(cs.length===0)return CFG.fireballMin;
  const totalW=cs.reduce((a,c)=>a+c.w,0);
  let rn=Math.random()*totalW, cum=0;
  for(const c of cs){cum+=c.w;if(rn<cum)return c.n;}
  return cs[0].n;
}
let buyBonus=null, autoChargeMax=false, autoWildPerSpin=false, fsTotalWin=0;
const bets=[0.20, 0.50, 1, 2, 5, 10, 20, 50, 100];
let betIdx=2;

// ===== RTP 95% ENGINE CONFIG =====
// Symbol weights calibrated for ~95% RTP over 1B spins
// Rarer high-pay symbols, more common low-pay symbols
const W={
  potOfGold:8,      // rarest - highest pay
  greenAcorn:12,    // rare
  crystalBell:15,   // medium
  redMushroom:18,   // medium-common
  blueMushroom:20,  // common
  celticKnot:24,    // most common - lowest pay
  scatter:1         // ~0.25% per cell → ~0.25%*48cells ≈ 12% to see ≥1, ~0.24% for ≥3
};

// ===== GAME FEATURE CONFIG (editable from menu) =====
const CFG={
  // Scatter / Free Spins
  scatterWeight:1,          // base scatter weight (in W above)
  scatterForFS:3,           // scatters needed for FS
  fsSpins:8,                // base free spins awarded
  fsSpins4:12,              // FS for 4 scatters
  fsSpins5:15,              // FS for 5+ scatters
  fsRetriggerExtra:3,       // extra spins on retrigger during FS

  // Fireballs
  fireballMin:2,            // min fireballs per charge-75 ability
  fireballMax:4,            // max fireballs
  fireballBuyMin:2,         // min fireballs when buying
  fireballBuyMax:4,         // max fireballs when buying
  // Fireball count weights: how often each count appears
  fireballCounts:[
    {n:1, w:0},
    {n:2, w:63},
    {n:3, w:40},
    {n:4, w:13},
    {n:5, w:0},
    {n:6, w:0},
    {n:7, w:0},
    {n:8, w:0}
  ],
  // Fireball multipliers: [value, weight] - lower weight = rarer
  fireballMultis:[
    {v:1,  w:67},
    {v:2,  w:53},
    {v:3,  w:23.5},
    {v:5,  w:7},
    {v:10, w:4},
    {v:25, w:1.8},
    {v:50, w:0.8},
    {v:100,w:0.4}
  ],

  // Big Symbols
  bigSym2x2Chance:0.08,     // chance to place a 2x2 each spin
  bigSym3x3Chance:0.03,     // chance to place a 3x3 each spin
  bigSymBuyMin:2,           // minimum big syms when buying

  // Charge Bar
  chargeMax:120,            // points to fill bar
  chargeTh1:30,             // threshold 1 - ability trigger
  chargeTh2:60,             // threshold 2
  chargeTh3:90,             // threshold 3
  chargeTh4:120,            // threshold 4 - WILD transform + multiplier

  // Charge Abilities
  removeSymMin:1,           // min symbol types removed (ability 25)
  removeSymMax:4,           // max symbol types removed
  // Remove Symbols buy multiplier wheel
  removeSymMultis:[
    {v:1,   w:50},
    {v:2,   w:30},
    {v:3,   w:10},
    {v:5,   w:5},
    {v:10,  w:2},
    {v:25,  w:2},
    {v:50,  w:1},
    {v:100, w:1},
    {v:1000,w:0.1}
  ],
  transformEnabled:true,    // symbol transform ability

let WT=Object.values(W).reduce((a,b)=>a+b,0);

function rndSym(doubleScatter){
  let tw=WT;
  if(doubleScatter)tw+=W.scatter;
  let r=Math.random()*tw;
  for(const[s,w]of Object.entries(W)){
    const ew=(doubleScatter&&s==='scatter')?w*2:w;
    r-=ew;if(r<=0)return s;
  }
  return'celticKnot';
}
let spinSpeed=1; // 1=normal, 1.25=fast, 1.5=faster, 2=turbo
function sleep(ms){return new Promise(r=>setTimeout(r,Math.max(ms/spinSpeed,10)))}
function setSpeed(s){
  spinSpeed=s;
  document.querySelectorAll('.speed-btn').forEach(b=>{
    b.classList.toggle('active',parseFloat(b.dataset.speed)===s);
  });
  // Also speed up CSS animations
  document.documentElement.style.setProperty('--anim-speed',1/s);
}

// Big symbol types (including wild)
const bigSymTypes=['potOfGold','redMushroom','greenAcorn','celticKnot','blueMushroom','crystalBell','wild'];
let bigIdCounter=0;

// Try to place big symbols on the grid after normal fill
function placeBigSymbols(forceMin){
  const minBig=forceMin||0;
  let placed=0;

  function tryPlace(size){
    const maxC=COLS-size,maxR=ROWS-size;
    const sym=bigSymTypes[Math.floor(Math.random()*bigSymTypes.length)];
    const c=Math.floor(Math.random()*(maxC+1));
    const r=Math.floor(Math.random()*(maxR+1));
    let free=true;
    for(let dc=0;dc<size;dc++)for(let dr=0;dr<size;dr++){
      const v=grid[c+dc][r+dr];
      if(v&&typeof v==='string'&&v.startsWith('B'))free=false;
    }
    if(free){
      const id='B'+bigIdCounter++;
      for(let dc=0;dc<size;dc++)for(let dr=0;dr<size;dr++)grid[c+dc][r+dr]=id;
      bigSymMap[id]={sym,size,c,r};
      placed++;return true;
    }
    return false;
  }

  // Normal random placement
  if(Math.random()<CFG.bigSym3x3Chance)tryPlace(3);
  if(Math.random()<CFG.bigSym2x2Chance)tryPlace(2);

  // Force minimum if buy bonus active
  let attempts=0;
  while(placed<minBig&&attempts<20){
    const size=Math.random()<0.4?3:2;
    tryPlace(size);
    attempts++;
  }
}

// Map of big symbol IDs to their info
let bigSymMap={};

// Decompose remaining big symbols into individual cells with animation
async function decomposeBigSymbols(){
  const ids=Object.keys(bigSymMap);
  if(ids.length===0)return false;

  // Collect all cells that belong to big symbols
  const affectedCells=[];
  const infos=[];
  for(const id of ids){
    const info=bigSymMap[id];
    if(!info)continue;
    infos.push({...info, id});
    for(let dc=0;dc<info.size;dc++){
      for(let dr=0;dr<info.size;dr++){
        const c=info.c+dc, r=info.r+dr;
        if(c<COLS&&r<ROWS)affectedCells.push({c,r});
      }
    }
  }

  // 1. Animate big symbol anchors shrinking/decomposing
  for(const info of infos){
    const anchor=document.getElementById('c'+info.c+'_'+info.r);
    if(anchor)anchor.classList.add('big-decompose');
  }
  await sleep(650);

  // 2. Replace big IDs in grid with actual symbol name (1x1 each)
  for(const info of infos){
    for(let dc=0;dc<info.size;dc++){
      for(let dr=0;dr<info.size;dr++){
        const c=info.c+dc, r=info.r+dr;
        if(c<COLS&&r<ROWS&&grid[c][r]===info.id){
          grid[c][r]=info.sym;
        }
      }
    }
    delete bigSymMap[info.id];
  }

  // 3. Re-render
  renderAll();

  // 4. Animate only the affected cells popping in as individual symbols
  for(const p of affectedCells){
    const el=document.getElementById('c'+p.c+'_'+p.r);
    if(el)el.classList.add('big-appear');
  }
  await sleep(550);
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('big-decompose','big-appear'));
  return true;
}

// Get the actual symbol for a cell (resolves big sym IDs)
function getSymAt(c,r){
  const v=grid[c][r];
  if(v&&v.startsWith&&v.startsWith('B')){
    const info=bigSymMap[v];
    return info?info.sym:'beerLight';
  }
  return v;
}

// Check if cell is anchor (top-left) of a big symbol
function isBigAnchor(c,r){
  const v=grid[c][r];
  if(!v||!v.startsWith||!v.startsWith('B'))return null;
  const info=bigSymMap[v];
  if(info&&info.c===c&&info.r===r)return info;
  return null;
}

// Check if cell is part of a big symbol (not anchor)
function isBigPart(c,r){
  const v=grid[c][r];
  if(!v||!v.startsWith||!v.startsWith('B'))return false;
  const info=bigSymMap[v];
  return info&&!(info.c===c&&info.r===r);
}

// ===== CASCADE =====
async function cascade(){
  let clusters=findClusters();
  while(clusters.length>0){
    // One wild per cluster ONLY if cluster has NO wilds in it (configurable)
    const wildPositions=[];
    const wildSet=new Set();
    if(CFG.wildPerCluster){
      for(const cl of clusters){
        const hasWild=cl.cells.some(p=>getSymAt(p.c,p.r)==='wild');
        if(!hasWild){
          const pos=cl.cells[Math.floor(Math.random()*cl.cells.length)];
          wildPositions.push(pos);
          wildSet.add(pos.c+','+pos.r);
        }
      }
    }

    // Only cluster cells get removed (no extra matching)
    const clusterSet=new Set();
    const clusterCells=[];
    for(const cl of clusters){for(const p of cl.cells){
      const k=p.c+','+p.r;
      if(!clusterSet.has(k)){clusterSet.add(k);clusterCells.push(p)}
    }}

    // 1. Highlight cluster cells
    for(let i=0;i<clusterCells.length;i++){
      const p=clusterCells[i];
      document.getElementById('c'+p.c+'_'+p.r).classList.add('winning');
      if(i<6)await sleep(40);
    }
    const w=calcWinAll(clusters)*chargeMulti*fireballMulti*removeSymMulti;totalWin+=w;
    document.getElementById('winV').textContent=(inFS?(fsTotalWin+totalWin):totalWin).toFixed(2);
    // Add paid symbols to charge bar
    chargePoints=Math.min(CFG.chargeMax,chargePoints+clusterCells.length);
    updCharge();
    await sleep(1000);

    // 2. Explode cluster cells (except wild positions)
    for(const p of clusterCells){
      if(wildSet.has(p.c+','+p.r))continue;
      const el=document.getElementById('c'+p.c+'_'+p.r);
      el.classList.remove('winning');el.classList.add('explode');
    }
    await sleep(900);

    // 3. Spawn WILD at each cluster's chosen position
    for(let i=0;i<wildPositions.length;i++){
      const wp=wildPositions[i];
      const wildCell=document.getElementById('c'+wp.c+'_'+wp.r);
      wildCell.classList.remove('winning');
      grid[wp.c][wp.r]='wild';
      wildCell.innerHTML='<div class="sym">'+S['wild'].svg+'</div>';
      wildCell.classList.add('wild-spawn');
      if(wildPositions.length>1)await sleep(200);
    }
    await sleep(1100);

    // 4. Clean up big symbol references for removed cells
    for(const p of clusterCells){
      if(wildSet.has(p.c+','+p.r))continue;
      const v=grid[p.c][p.r];
      if(v&&v.startsWith&&v.startsWith('B'))delete bigSymMap[v];
    }
    // Remove exploded symbols from grid (NOT wild positions)
    for(let c=0;c<COLS;c++){
      const wr=clusterCells.filter(p=>p.c===c&&!wildSet.has(p.c+','+p.r)).map(p=>p.r).sort((a,b)=>b-a);
      for(const r of wr)grid[c].splice(r,1);
      for(let i=0;i<wr.length;i++)grid[c].unshift(rndSym());
    }

    // 6. Render and animate drops
    renderAll();
    for(let c=0;c<COLS;c++){
      const dropCount=clusterCells.filter(p=>p.c===c&&!wildSet.has(p.c+','+p.r)).length;
      for(let r=0;r<dropCount;r++){
        const el=document.getElementById('c'+c+'_'+r);
        el.classList.add('drop');
        el.style.animationDelay=(c*60+r*30)+'ms';
      }
    }
    for(const wp of wildPositions){
      const newWC=document.getElementById('c'+wp.c+'_'+wp.r);
      newWC.classList.add('wild-spawn');
    }

    await sleep(900);
    document.querySelectorAll('.cell').forEach(c=>{c.classList.remove('explode','drop','wild-spawn');c.style.animationDelay=''});
    clusters=findClusters();
  }
}

// ===== CLUSTER WINS (adjacent matching, wild = joker) =====
// Returns array of clusters, each cluster is an array of {c,r}
function findClusters(){
  const clusters=[];
  const symTypes=Object.keys(S).filter(s=>s!=='wild'&&s!=='scatter');
  const usedCells=new Set();

  for(const symType of symTypes){
    const vis=Array.from({length:COLS},()=>Array(ROWS).fill(false));
    for(let c=0;c<COLS;c++){for(let r=0;r<ROWS;r++){
      if(vis[c][r])continue;
      const cellSym=getSymAt(c,r);
      if(cellSym!==symType&&cellSym!=='wild')continue;
      const cl=[],q=[{c,r}];vis[c][r]=true;
      while(q.length){const p=q.shift();cl.push(p);
        for(const[dc,dr]of[[-1,0],[1,0],[0,-1],[0,1]]){
          const nc=p.c+dc,nr=p.r+dr;
          if(nc>=0&&nc<COLS&&nr>=0&&nr<ROWS&&!vis[nc][nr]){
            const ns=getSymAt(nc,nr);
            if(ns===symType||ns==='wild'){vis[nc][nr]=true;q.push({c:nc,r:nr})}
          }
        }
      }
      // Count non-wild symbols in cluster - need at least 1 non-wild
      const nonWild=cl.filter(p=>getSymAt(p.c,p.r)!=='wild');
      if(cl.length>=5&&nonWild.length>=1){
        // Mark non-wild cells as used, but wilds can be shared across clusters
        const hasNewNonWild=nonWild.some(p=>!usedCells.has(p.c+','+p.r));
        if(hasNewNonWild){
          for(const p of nonWild)usedCells.add(p.c+','+p.r);
          clusters.push({sym:symType, cells:cl});
        }
      }
    }}
  }
  return clusters;
}

// Calculate win based on cluster size tiers
function calcWinAll(clusters){
  let total=0;
  for(const cl of clusters){
    const size=cl.cells.length;
    const ti=getTierIdx(size);
    if(ti<0)continue;
    const pay=S[cl.sym]?.tiers?.[ti]||0;
    total+=pay*bet;
  }
  return total;
}

function checkScat(){
  let n=0;for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++)if(getSymAt(c,r)==='scatter')n++;
  if(n>=CFG.scatterForFS){
    const sp=n===3?CFG.fsSpins:n===4?CFG.fsSpins4:CFG.fsSpins5;
    if(inFS){freeSpins+=CFG.fsRetriggerExtra;updFS();showBanner(CFG.fsRetriggerExtra)}
    else{freeSpins+=sp;inFS=true;fsTotalWin=0;showBanner(sp);updFS()}
  }
}

  const th2Pct=CFG.chargeTh2/CFG.chargeMax*100;
  const th3Pct=CFG.chargeTh3/CFG.chargeMax*100;
  const th4Pct=CFG.chargeTh4/CFG.chargeMax*100;
  const marks=[{id:'cm1',th:th1Pct},{id:'cm2',th:th2Pct},{id:'cm3',th:th3Pct},{id:'cm4',th:th4Pct}];

      el.classList.add('reached');
      if(!wasReached)newlyReached.push(m.th);
    }else{el.classList.remove('reached')}
  }
  return newlyReached;
}

// Track which thresholds were reached this spin
let chargeTriggered=new Set();

// Random ability picker for levels 25/50/75
function pickRandomAbility(){
  const pool=[chargeAbility25, chargeAbility75, chargeAbilityBigSymbols];
  if(CFG.transformEnabled) pool.push(chargeAbility50);
  return pool[Math.floor(Math.random()*pool.length)];
}

async function triggerChargeAbilities(){
  const ths=[CFG.chargeTh1,CFG.chargeTh2,CFG.chargeTh3];
  for(const th of ths){
    if(chargePoints>=th&&!chargeTriggered.has(th)){
      chargeTriggered.add(th);
      await pickRandomAbility()();
      await cascade();
      fireballMulti=1; // reset after fireball cascade
      if(chargePoints>=CFG.chargeTh1)await triggerChargeAbilities();
      return;
    }
  }
  if(chargePoints>=CFG.chargeTh4&&!chargeTriggered.has(CFG.chargeTh4)){
    chargeTriggered.add(CFG.chargeTh4);
    await chargeAbility100();
    chargePoints=chargePoints-CFG.chargeMax;
    chargeMulti+=CFG.chargeMultiStep;
    chargeTriggered=new Set();
    updCharge();
    await showChargeNumber('x'+chargeMulti, 'ALL WINS MULTIPLIED');
    await cascade();
    fireballMulti=1;
    if(chargePoints>=CFG.chargeTh1)await triggerChargeAbilities();
  }
}

// Pick random multiplier from Remove Symbols wheel
function pickRemoveSymMulti(){
  const ms=CFG.removeSymMultis;
  const totalW=ms.reduce((a,m)=>a+m.w,0);
  let rn=Math.random()*totalW,cum=0;
  for(const m of ms){cum+=m.w;if(rn<cum)return m.v;}
  return ms[0].v;

// Charge ability: remove symbol types from grid
async function chargeAbility25(){
  const symTypes=Object.keys(S).filter(s=>s!=='wild'&&s!=='scatter');
  const count=CFG.removeSymMin+Math.floor(Math.random()*(CFG.removeSymMax-CFG.removeSymMin+1));

  // Show the number with animation
  await showChargeNumber(count, count===1?'SYMBOL REMOVED':count+' SYMBOLS REMOVED');

  // Shuffle and pick
  const shuffled=symTypes.sort(()=>Math.random()-0.5).slice(0,count);

  // Find all cells to remove
  const toRemove=[];
  for(let c=0;c<COLS;c++){for(let r=0;r<ROWS;r++){
    if(shuffled.includes(getSymAt(c,r)))toRemove.push({c,r});
  }}
  if(toRemove.length===0)return;

  // Highlight with dissolve animation
  for(const p of toRemove){
    document.getElementById('c'+p.c+'_'+p.r).classList.add('winning');
  }
  await sleep(800);
  for(const p of toRemove){
    const el=document.getElementById('c'+p.c+'_'+p.r);
    el.classList.remove('winning');el.classList.add('dissolve');
  }
  await sleep(900);

  // Remove from grid and fill new symbols
  for(let c=0;c<COLS;c++){
    const wr=toRemove.filter(p=>p.c===c).map(p=>p.r).sort((a,b)=>b-a);
    for(const r of wr)grid[c].splice(r,1);
    for(let i=0;i<wr.length;i++)grid[c].unshift(rndSym());
  }

  // Render and animate drops
  renderAll();
  for(let c=0;c<COLS;c++){
    const dropCount=toRemove.filter(p=>p.c===c).length;
    for(let r=0;r<dropCount;r++){
      const el=document.getElementById('c'+c+'_'+r);
      el.classList.add('drop');
      el.style.animationDelay=(c*60+r*30)+'ms';
    }
  }
  await sleep(900);
  document.querySelectorAll('.cell').forEach(c=>{c.classList.remove('dissolve','drop');c.style.animationDelay=''});
}
// Charge ability 50: transform all of one symbol type into another
async function chargeAbility50(){
  const symTypes=Object.keys(S).filter(s=>s!=='wild'&&s!=='scatter');
  // Pick source symbol (the one to transform)
  const srcSym=symTypes[Math.floor(Math.random()*symTypes.length)];
  // Pick target symbol (different from source)
  const targets=symTypes.filter(s=>s!==srcSym);
  const tgtSym=targets[Math.floor(Math.random()*targets.length)];

  // Show popup
  await showChargeNumber('TRANSFORM', S[srcSym].name+' → '+S[tgtSym].name);

  // Find all cells with source symbol
  const toTransform=[];
  for(let c=0;c<COLS;c++){for(let r=0;r<ROWS;r++){
    if(getSymAt(c,r)===srcSym)toTransform.push({c,r});
  }}
  if(toTransform.length===0)return;

  // Highlight source symbols
  for(const p of toTransform){
    document.getElementById('c'+p.c+'_'+p.r).classList.add('winning');
  }
  await sleep(800);

  // Transform with animation: flash then change
  for(const p of toTransform){
    const el=document.getElementById('c'+p.c+'_'+p.r);
    el.classList.remove('winning');
    el.classList.add('wild-spawn');
    // Update grid
    const v=grid[p.c][p.r];
    if(v&&v.startsWith&&v.startsWith('B')){
      // Big symbol: update the bigSymMap
      const info=bigSymMap[v];
      if(info)info.sym=tgtSym;
    }else{
      grid[p.c][p.r]=tgtSym;
    }
  }
  await sleep(300);
  renderAll();
  // Re-apply animation to transformed cells
  for(const p of toTransform){
    document.getElementById('c'+p.c+'_'+p.r).classList.add('wild-spawn');
  }
  await sleep(900);
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('wild-spawn'));
}

// Charge ability 75: launch fireballs like meteorites with multipliers
async function chargeAbility75(){
  const count=pickFireballCount();
  await showChargeNumber(count, count===1?'FIREBALL':'FIREBALLS');

  const usedPositions=new Set();
  let totalFbMulti=0; // sum of all fireball multipliers this round

  for(let i=0;i<count;i++){
    let tc,tr,attempts=0;
    do{
      tc=Math.floor(Math.random()*COLS);
      tr=Math.floor(Math.random()*ROWS);
      attempts++;
    }while((getSymAt(tc,tr)==='wild'||getSymAt(tc,tr)==='scatter'||usedPositions.has(tc+','+tr))&&attempts<30);

    if(usedPositions.has(tc+','+tr))continue;
    usedPositions.add(tc+','+tr);

    const targetSym=getSymAt(tc,tr);
    if(targetSym==='wild'||targetSym==='scatter')continue;

    // Pick random multiplier for this fireball (1 = no multiplier)
    const fbMulti=pickFireballMulti();
    if(fbMulti>1)totalFbMulti+=fbMulti;

    const frame=document.getElementById('frameWrap');
    const targetCell=document.getElementById('c'+tc+'_'+tr);
    const frameRect=frame.getBoundingClientRect();
    const cellRect=targetCell.getBoundingClientRect();
    const targetX=cellRect.left-frameRect.left+cellRect.width/2-18;
    const targetY=cellRect.top-frameRect.top+cellRect.height/2-18;

    // Create fireball starting from top-left (diagonal meteor path)
    const startX=targetX-120-Math.random()*80;
    const fb=document.createElement('div');
    fb.className='fireball';
    fb.style.position='absolute';
    fb.style.left=startX+'px';
    fb.style.top='-60px';
    fb.style.transition='top 0.45s cubic-bezier(.1,.2,.3,1), left 0.45s cubic-bezier(.1,.2,.3,1), transform 0.45s ease-in';
    fb.style.transform='scale(0.6)';
    frame.appendChild(fb);

    // Multiplier badge on fireball (only if > 1x)
    if(fbMulti>1){
      const fbBadge=document.createElement('div');
      fbBadge.className='fb-multi-badge';
      fbBadge.textContent=fbMulti+'x';
      fbBadge.style.cssText='position:absolute;top:-8px;right:-12px;background:linear-gradient(135deg,#FFD700,#FF6000);color:#000;font-weight:900;font-size:11px;padding:1px 5px;border-radius:8px;z-index:122;text-shadow:0 0 2px #fff;white-space:nowrap;pointer-events:none;';
      if(fbMulti>=25)fbBadge.style.background='linear-gradient(135deg,#ff44ff,#FFD700)';
      if(fbMulti>=50)fbBadge.style.background='linear-gradient(135deg,#44ffff,#ff44ff)';
      if(fbMulti>=100)fbBadge.style.background='linear-gradient(135deg,#fff,#44ffff,#FFD700)';
      fb.appendChild(fbBadge);
    }

    await sleep(50);
    // Meteor flies diagonally down to target, growing bigger
    fb.style.left=targetX+'px';
    fb.style.top=targetY+'px';
    fb.style.transform='scale(1.3)';
    await sleep(480);

    // IMPACT! Create crater explosion
    const crater=document.createElement('div');
    crater.className='fire-crater';
    crater.style.position='absolute';
    crater.style.left=(targetX-62)+'px';
    crater.style.top=(targetY-62)+'px';
    frame.appendChild(crater);

    // Show multiplier popup at impact point (only if > 1x)
    let multiPop=null;
    if(fbMulti>1){
      multiPop=document.createElement('div');
      multiPop.className='fb-multi-pop';
      multiPop.textContent=fbMulti+'x';
      const popColor=fbMulti>=50?'#44ffff':fbMulti>=25?'#ff44ff':fbMulti>=10?'#FFD700':'#FF8C00';
      multiPop.style.cssText=`position:absolute;left:${targetX-20}px;top:${targetY-30}px;color:${popColor};font-size:${fbMulti>=25?'28':'22'}px;font-weight:900;z-index:130;pointer-events:none;text-shadow:0 0 10px ${popColor},0 0 20px ${popColor},0 2px 4px #000;animation:fbMultiFloat 1.2s ease-out forwards;white-space:nowrap;`;
      frame.appendChild(multiPop);
    }

    // Shake on impact (shakeWrap only, grid stays fixed)
    const shakeEl=document.getElementById('shakeWrap');
    shakeEl.classList.remove('grid-shake');
    shakeEl.offsetHeight; // reflow
    shakeEl.classList.add('grid-shake');

    // Impact on target cell
    targetCell.classList.add('fire-impact');
    fb.remove();

    await sleep(150);

    // Fire spreads to adjacent cells one by one
    const adj=[[tc-1,tr],[tc+1,tr],[tc,tr-1],[tc,tr+1]];
    const toChange=[];
    for(const[ac,ar]of adj){
      if(ac>=0&&ac<COLS&&ar>=0&&ar<ROWS){
        const s=getSymAt(ac,ar);
        if(s!=='wild'&&s!=='scatter')toChange.push({c:ac,r:ar});
      }
    }

    // Stagger fire spread to each adjacent cell
    for(let j=0;j<toChange.length;j++){
      const p=toChange[j];
      const el=document.getElementById('c'+p.c+'_'+p.r);
      el.classList.add('fire-spread');
      // Update grid
      const v=grid[p.c][p.r];
      if(v&&v.startsWith&&v.startsWith('B')){
        const info=bigSymMap[v];
        if(info){
          for(let dc=0;dc<info.size;dc++)for(let dr=0;dr<info.size;dr++){
            if(info.c+dc<COLS&&info.r+dr<ROWS)grid[info.c+dc][info.r+dr]=targetSym;
          }
          delete bigSymMap[v];
        }
      }else{
        grid[p.c][p.r]=targetSym;
      }
      await sleep(120); // stagger each spread
    }

    await sleep(300);
    renderAll();
    // Re-apply effects
    targetCell.classList.add('fire-impact');
    for(const p of toChange)document.getElementById('c'+p.c+'_'+p.r).classList.add('fire-spread');

    await sleep(600);
    crater.remove();
    if(multiPop)setTimeout(()=>multiPop.remove(),600);
    const shakeClean=document.getElementById('shakeWrap');
    if(shakeClean)shakeClean.classList.remove('grid-shake');
    document.querySelectorAll('.cell').forEach(c=>c.classList.remove('fire-impact','fire-spread'));

    if(i<count-1)await sleep(400);
  }

  // Apply total fireball multiplier to next cascade
  if(totalFbMulti>0){
    fireballMulti=totalFbMulti;
    await showChargeNumber('x'+totalFbMulti, 'FIREBALL MULTIPLIER');
  }
}

// Charge ability: drop giant symbols (2x2 or 3x3)
async function chargeAbilityBigSymbols(){
  const count=CFG.bigDropMin+Math.floor(Math.random()*(CFG.bigDropMax-CFG.bigDropMin+1));
  const sizeLabel=count===1?'1 GIANT SYMBOL':'2 GIANT SYMBOLS';
  await showChargeNumber(count, sizeLabel);

  for(let i=0;i<count;i++){
    const size=Math.random()<CFG.bigDrop3x3Chance?3:2;
    const sym=bigSymTypes[Math.floor(Math.random()*bigSymTypes.length)];
    const maxC=COLS-size, maxR=ROWS-size;
    let placed=false, attempts=0;
    while(!placed&&attempts<30){
      const c=Math.floor(Math.random()*(maxC+1));
      const r=Math.floor(Math.random()*(maxR+1));
      // Check cells are free of big symbols
      let free=true;
      for(let dc=0;dc<size;dc++)for(let dr=0;dr<size;dr++){
        const v=grid[c+dc][r+dr];
        if(v&&typeof v==='string'&&v.startsWith('B'))free=false;
      }
      if(free){
        // Animate: highlight target area
        for(let dc=0;dc<size;dc++)for(let dr=0;dr<size;dr++){
          document.getElementById('c'+(c+dc)+'_'+(r+dr)).classList.add('winning');
        }
        await sleep(400);
        // Place big symbol
        const id='B'+bigIdCounter++;
        for(let dc=0;dc<size;dc++)for(let dr=0;dr<size;dr++)grid[c+dc][r+dr]=id;
        bigSymMap[id]={sym,size,c,r};
        renderAll();
        // Animate spawn
        document.getElementById('c'+c+'_'+r).classList.add('wild-spawn');
        await sleep(600);
        document.querySelectorAll('.cell').forEach(el=>el.classList.remove('winning','wild-spawn'));
        placed=true;
      }
      attempts++;
    }
    if(i<count-1)await sleep(300);
  }
}

// Charge ability 100: turn all of one symbol type into WILD
async function chargeAbility100(){
  const symTypes=Object.keys(S).filter(s=>s!=='wild'&&s!=='scatter');
  const chosen=symTypes[Math.floor(Math.random()*symTypes.length)];

  await showChargeNumber('WILD', 'ALL '+S[chosen].name.toUpperCase()+' → WILD');

  // Find all cells with chosen symbol
  const toWild=[];
  for(let c=0;c<COLS;c++){for(let r=0;r<ROWS;r++){
    if(getSymAt(c,r)===chosen)toWild.push({c,r});
  }}
  if(toWild.length===0)return;

  // Highlight
  for(const p of toWild){
    document.getElementById('c'+p.c+'_'+p.r).classList.add('winning');
  }
  await sleep(800);

  // Transform to wild with animation
  for(const p of toWild){
    const el=document.getElementById('c'+p.c+'_'+p.r);
    el.classList.remove('winning');
    el.classList.add('wild-spawn');
    const v=grid[p.c][p.r];
    if(v&&v.startsWith&&v.startsWith('B')){
      const info=bigSymMap[v];
      if(info)info.sym='wild';

  await sleep(300);

  for(const p of toWild){
    document.getElementById('c'+p.c+'_'+p.r).classList.add('wild-spawn');
  }
  await sleep(1000);
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('wild-spawn'));
}

window.edToggleMode=function(){
  editMode=!editMode;
  const btn=document.getElementById('edModeBtn');
  if(editMode){
    btn.textContent='EDIT ON';
    btn.style.background='#FFD700';
    btn.style.color='#000';
    // Enable dragging on all elements
    for(const g of EDITABLES){
      if(!g.custom) enableDrag(g);
    }
    // Allow pointer events on frame-img for dragging
    const frameImg=document.querySelector('.frame-img');
    if(frameImg) frameImg.style.pointerEvents='auto';
    document.getElementById('edSelected').style.display='block';
  } else {
    btn.textContent='EDIT OFF';
    btn.style.background='#555';
    btn.style.color='#fff';
    clearSelection();
    // Restore pointer-events:none on frame-img
    const frameImg=document.querySelector('.frame-img');
    if(frameImg) frameImg.style.pointerEvents='none';
    document.getElementById('edSelected').style.display='none';
    removeResizeHandles();
  }
};

function clearSelection(){
  if(selectedEl){
    selectedEl.classList.remove('ed-drag-outline');
  }
  selectedEl=null;
  document.querySelectorAll('.ed-item').forEach(i=>i.classList.remove('active'));
  document.querySelectorAll('[id^="edDot_"]').forEach(d=>d.style.background='#555');
  removeResizeHandles();
}

function removeResizeHandles(){
  document.querySelectorAll('.ed-resize-handle').forEach(h=>h.remove());
}

function addResizeHandles(el){
  removeResizeHandles();
  const r=el.getBoundingClientRect();
  const positions=[
    {name:'se',left:r.right-5,top:r.bottom-5,cursor:'nwse-resize'},
    {name:'sw',left:r.left-5,top:r.bottom-5,cursor:'nesw-resize'},
    {name:'ne',left:r.right-5,top:r.top-5,cursor:'nesw-resize'},
    {name:'nw',left:r.left-5,top:r.top-5,cursor:'nwse-resize'},
    {name:'e',left:r.right-5,top:r.top+r.height/2-5,cursor:'ew-resize'},
    {name:'w',left:r.left-5,top:r.top+r.height/2-5,cursor:'ew-resize'},
  ];
  positions.forEach(pos=>{
    const h=document.createElement('div');
    h.className='ed-resize-handle';
    h.dataset.handle=pos.name;
    h.style.position='fixed';
    h.style.left=pos.left+'px';
    h.style.top=pos.top+'px';
    h.style.cursor=pos.cursor;
    h.addEventListener('mousedown',onResizeStart);
    document.body.appendChild(h);
  });
}

function selectElement(el,defId){
  if(!editMode)return;
  clearSelection();
  selectedEl=el;
  el.classList.add('ed-drag-outline');

  // Highlight in panel
  const item=document.querySelector('.ed-item[data-edid="'+defId+'"]');
  if(item)item.classList.add('active');
  const dot=document.getElementById('edDot_'+defId);
  if(dot)dot.style.background='#FFD700';

  // Update label
  const def=EDITABLES.find(e=>e.id===defId);
  document.getElementById('edSelLabel').textContent=def?def.label:'Selezionato';

  // Update pos display
  const orig=origPos.get(defId)||{tx:0,ty:0};
  document.getElementById('edPosX').textContent=Math.round(orig.tx);
  document.getElementById('edPosY').textContent=Math.round(orig.ty);

  // Build sliders
  buildSliders(defId);
  addResizeHandles(el);
}

window.edSelectById=function(id){
  const def=EDITABLES.find(e=>e.id===id);
  if(!def)return;
  if(!editMode) edToggleMode();
  if(def.custom){
    // For custom items (cells,bg), just show sliders without dragging
    clearSelection();
    const item=document.querySelector('.ed-item[data-edid="'+id+'"]');
    if(item)item.classList.add('active');
    const dot=document.getElementById('edDot_'+id);
    if(dot)dot.style.background='#FFD700';
    document.getElementById('edSelLabel').textContent=def.label;
    document.getElementById('edSelected').style.display='block';
    buildSliders(id);
    return;
  }
  const el=document.querySelector(def.sel);
  if(el) selectElement(el,id);
};

function buildSliders(defId){
  const def=EDITABLES.find(e=>e.id===defId);
  const container=document.getElementById('edSliders');
  container.innerHTML='';
  if(!def||!def.sliders||def.sliders.length===0)return;

  for(const s of def.sliders){
    let curVal=s.d||0;
    if(!def.custom){
      const el=document.querySelector(def.sel);
      if(el){
        const cv=parseFloat(getComputedStyle(el)[s.p]);
        if(!isNaN(cv)) curVal=Math.round(cv);
      }
    }
    let row=document.createElement('div');
    row.style.cssText='margin:4px 0';
    row.innerHTML=
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1px">'+
      '<label style="font-size:10px;color:#aaa">'+s.l+'</label>'+
      '<span style="font-size:10px;color:#FFD700;min-width:35px;text-align:right" id="edVal_'+defId+'_'+s.p+'">'+curVal+s.u+'</span>'+
      '</div>'+
      '<input type="range" class="ed-slider" min="'+s.min+'" max="'+s.max+'" value="'+curVal+'" '+
      'data-edid="'+defId+'" data-p="'+s.p+'" data-u="'+s.u+'" '+
      'oninput="edSlide(this)">';
    container.appendChild(row);
  }
}

window.edSlide=function(inp){
  const v=parseInt(inp.value);
  const defId=inp.dataset.edid;
  const prop=inp.dataset.p;
  const unit=inp.dataset.u;
  const def=EDITABLES.find(e=>e.id===defId);

  // Update display
  const valSpan=document.getElementById('edVal_'+defId+'_'+prop);
  if(valSpan) valSpan.textContent=v+unit;

  if(!def)return;

  // Custom: cells
  if(def.custom==='cells'){
    if(prop==='cellW') document.querySelectorAll('.cell').forEach(c=>c.style.width=v+'px');
    if(prop==='cellH') document.querySelectorAll('.cell').forEach(c=>c.style.height=v+'px');
    if(prop==='symW') document.querySelectorAll('.cell .sym').forEach(s=>s.style.width=v+'px');
    if(prop==='symH') document.querySelectorAll('.cell .sym').forEach(s=>s.style.height=v+'px');
    if(prop==='cellGap'){
      document.querySelectorAll('.reels').forEach(r=>r.style.gap=v+'px');
      document.querySelectorAll('.reel').forEach(r=>r.style.gap=v+'px');
    }
    return;
  }
  // Custom: background
  if(def.custom==='bg'){
    const bg=document.querySelector('.bg');
    if(prop==='bgX'||prop==='bgY'){
      const xInp=document.querySelector('.ed-slider[data-edid="bg"][data-p="bgX"]');
      const yInp=document.querySelector('.ed-slider[data-edid="bg"][data-p="bgY"]');
      bg.style.backgroundPosition=(xInp?xInp.value:50)+'% '+(yInp?yInp.value:50)+'%';
    }
    if(prop==='bgZoom') bg.style.backgroundSize=v+'%';
    return;
  }
  // Standard CSS prop
  const el=document.querySelector(def.sel);
  if(el) el.style[prop]=v+'px';

  // Update resize handles if this is the selected element
  if(selectedEl===el) addResizeHandles(el);
};

// ===== MOUSE HANDLERS FOR DRAG =====
document.addEventListener('mousedown',function(e){
  if(!editMode||e.button!==0)return;
  // Don't intercept slider or panel clicks
  const lp=document.getElementById('LP');
  if(lp&&lp.contains(e.target))return;
  if(e.target.id==='LPT'||e.target.id==='edModeBtn')return;
  if(e.target.classList.contains('ed-resize-handle'))return;

  // Find if click is on an editable element
  let found=null, foundDef=null;
  for(const g of EDITABLES){
    if(g.custom)continue;
    const el=document.querySelector(g.sel);
    if(!el)continue;
    const r=el.getBoundingClientRect();
    if(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom){
      // Pick the smallest (most specific) match
      if(!found||r.width*r.height<found.getBoundingClientRect().width*found.getBoundingClientRect().height){
        found=el;foundDef=g;
      }
    }
  }
  if(found&&foundDef){
    e.preventDefault();
    selectElement(found,foundDef.id);
    dragging=true;
    dragStartX=e.clientX;
    dragStartY=e.clientY;
    const orig=origPos.get(foundDef.id)||{tx:0,ty:0};
    elStartX=orig.tx;
    elStartY=orig.ty;
  }
},true);

document.addEventListener('mousemove',function(e){
  if(dragging&&selectedEl){
    const dx=e.clientX-dragStartX;
    const dy=e.clientY-dragStartY;
    const defId=selectedEl.dataset.edId;
    const orig=origPos.get(defId);
    if(orig){
      orig.tx=elStartX+dx;
      orig.ty=elStartY+dy;
      selectedEl.style.transform='translate('+orig.tx+'px,'+orig.ty+'px)';
      document.getElementById('edPosX').textContent=Math.round(orig.tx);
      document.getElementById('edPosY').textContent=Math.round(orig.ty);
      removeResizeHandles(); // hide during drag
    }
  }
  if(resizing&&selectedEl){
    const dx=e.clientX-resizeStartX;
    const dy=e.clientY-resizeStartY;
    let nw=resizeStartW, nh=resizeStartH;
    if(resizeHandle.includes('e')) nw=resizeStartW+dx;
    if(resizeHandle.includes('w')) nw=resizeStartW-dx;
    if(resizeHandle.includes('s')) nh=resizeStartH+dy;
    if(resizeHandle.includes('n')) nh=resizeStartH-dy;
    if(nw>30) selectedEl.style.width=nw+'px';
    if(nh>30) selectedEl.style.height=nh+'px';
    // Update sliders if present
    const defId=selectedEl.dataset.edId;
    const wSlider=document.querySelector('.ed-slider[data-edid="'+defId+'"][data-p="width"]');
    const hSlider=document.querySelector('.ed-slider[data-edid="'+defId+'"][data-p="height"]');
    if(wSlider){wSlider.value=Math.round(nw);const vs=document.getElementById('edVal_'+defId+'_width');if(vs)vs.textContent=Math.round(nw)+'px';}
    if(hSlider){hSlider.value=Math.round(nh);const vs=document.getElementById('edVal_'+defId+'_height');if(vs)vs.textContent=Math.round(nh)+'px';}
  }
});

document.addEventListener('mouseup',function(e){
  if(dragging&&selectedEl){
    dragging=false;
    addResizeHandles(selectedEl);
  }
  if(resizing){
    resizing=false;
    if(selectedEl) addResizeHandles(selectedEl);
  }
});

function onResizeStart(e){
  if(!selectedEl)return;
  e.preventDefault();
  e.stopPropagation();
  resizing=true;
  resizeHandle=e.target.dataset.handle;
  const r=selectedEl.getBoundingClientRect();
  resizeStartW=r.width;
  resizeStartH=r.height;
  resizeStartX=e.clientX;
  resizeStartY=e.clientY;
}

// ===== EXPORT =====
window.edExport=function(){
  const lines=['/* === EXPORTED LAYOUT === */'];
  for(const g of EDITABLES){
    lines.push('/* '+g.label+' */');
    if(!g.custom){
      const el=document.querySelector(g.sel);
      if(!el)continue;
      const pos=origPos.get(g.id);
      if(pos&&(pos.tx||pos.ty)) lines.push('  transform: translate('+Math.round(pos.tx)+'px, '+Math.round(pos.ty)+'px)');
      const cs=getComputedStyle(el);
      for(const s of g.sliders){
        lines.push('  '+s.p+': '+Math.round(parseFloat(cs[s.p]))+'px');
      }
    } else {
      for(const s of g.sliders){
        const inp=document.querySelector('.ed-slider[data-edid="'+g.id+'"][data-p="'+s.p+'"]');
        if(inp) lines.push('  '+s.p+': '+inp.value+s.u);
      }
    }
  }
  const css=lines.join('\n');
  navigator.clipboard.writeText(css).then(()=>alert('Layout copiato!')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=css;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();alert('Layout copiato!');
  });
};

// ===== SAVE / LOAD / RESET LAYOUT =====
const SAVE_KEY='slotEditorLayout';

window.edSave=function(){
  const data={};
  for(const g of EDITABLES){
    const entry={};
    if(!g.custom){
      const el=document.querySelector(g.sel);
      if(!el)continue;
      // Save position (transform)
      const pos=origPos.get(g.id);
      if(pos){entry._tx=pos.tx;entry._ty=pos.ty;}
      // Save slider values (computed style)
      const cs=getComputedStyle(el);
      for(const s of g.sliders){
        entry[s.p]=Math.round(parseFloat(cs[s.p]));
      }
    }else{
      // Custom: read from current slider inputs or DOM
      for(const s of g.sliders){
        const inp=document.querySelector('.ed-slider[data-edid="'+g.id+'"][data-p="'+s.p+'"]');
        if(inp){entry[s.p]=parseInt(inp.value);}
        else{
          // Read from DOM
          if(g.custom==='cells'){
            const cell=document.querySelector('.cell');
            if(cell){
              const cs=getComputedStyle(cell);
              if(s.p==='cellW')entry[s.p]=Math.round(parseFloat(cs.width));
              if(s.p==='cellH')entry[s.p]=Math.round(parseFloat(cs.height));
            }
            const sym=document.querySelector('.cell .sym');
            if(sym){
              const ss=getComputedStyle(sym);
              if(s.p==='symW')entry[s.p]=Math.round(parseFloat(ss.width));
              if(s.p==='symH')entry[s.p]=Math.round(parseFloat(ss.height));
            }
            const reel=document.querySelector('.reel');
            if(reel&&s.p==='cellGap')entry[s.p]=Math.round(parseFloat(getComputedStyle(reel).gap)||1);
          }
          if(g.custom==='bg'){
            entry[s.p]=s.d; // default
          }
        }
      }
    }
    data[g.id]=entry;
  }
  localStorage.setItem(SAVE_KEY,JSON.stringify(data));
  // Visual feedback
  const btn=document.querySelector('[onclick="edSave()"]');
  if(btn){const orig=btn.textContent;btn.textContent='SAVED!';btn.style.background='#00ff66';setTimeout(()=>{btn.textContent=orig;btn.style.background='#00cc55'},1200)}
};

window.edReset=function(){
  if(!confirm('Sei sicuro? Questo cancellerà tutte le modifiche salvate.'))return;
  localStorage.removeItem(SAVE_KEY);
  location.reload();
};

function edLoadSaved(){
  const raw=localStorage.getItem(SAVE_KEY);
  if(!raw)return;
  let data;
  try{data=JSON.parse(raw)}catch(e){return}

  for(const g of EDITABLES){
    const entry=data[g.id];
    if(!entry)continue;

    if(!g.custom){
      const el=document.querySelector(g.sel);
      if(!el)continue;
      // Apply position
      if(entry._tx!==undefined||entry._ty!==undefined){
        const tx=entry._tx||0,ty=entry._ty||0;
        if(tx||ty){
          el.style.transform='translate('+tx+'px,'+ty+'px)';
          // Also set in origPos for drag to work
          if(!el.dataset.edDrag){
            el.dataset.edDrag='1';
            el.dataset.edId=g.id;
          }
          origPos.set(g.id,{position:getComputedStyle(el).position,transform:el.style.transform,tx,ty});
        }
      }
      // Apply slider props
      for(const s of g.sliders){
        if(entry[s.p]!==undefined){
          el.style[s.p]=entry[s.p]+'px';
        }
      }
    }else if(g.custom==='cells'){
      if(entry.cellW)document.querySelectorAll('.cell').forEach(c=>c.style.width=entry.cellW+'px');
      if(entry.cellH)document.querySelectorAll('.cell').forEach(c=>c.style.height=entry.cellH+'px');
      if(entry.symW)document.querySelectorAll('.cell .sym').forEach(s=>s.style.width=entry.symW+'px');
      if(entry.symH)document.querySelectorAll('.cell .sym').forEach(s=>s.style.height=entry.symH+'px');
      if(entry.cellGap!==undefined){
        document.querySelectorAll('.reels').forEach(r=>r.style.gap=entry.cellGap+'px');
        document.querySelectorAll('.reel').forEach(r=>r.style.gap=entry.cellGap+'px');
      }
    }else if(g.custom==='bg'){
      const bg=document.querySelector('.bg');
      if(bg){
        if(entry.bgX!==undefined&&entry.bgY!==undefined)bg.style.backgroundPosition=entry.bgX+'% '+entry.bgY+'%';
        if(entry.bgZoom!==undefined)bg.style.backgroundSize=entry.bgZoom+'%';
      }
    }
  }
}

buildEditorPanel();
// Load saved layout after DOM is ready
edLoadSaved();
})();

// ===== OVERLAY DRAG SYSTEM =====
// Makes .sb-num and .sb-click elements draggable when drag mode is on
(function(){
  const DRAG_KEY='slotOverlayPositions';
  let dragMode=false;
  let dragTarget=null, dragStartX=0, dragStartY=0, elStartLeft=0, elStartTop=0;
  let parentRect=null;

  // All draggable overlays
  function getOverlays(){
    return document.querySelectorAll('.sb-num, .sb-click');
  }

  function toggleDragMode(){
    dragMode=!dragMode;
    const btn=document.getElementById('dragModeBtn');
    if(dragMode){
      btn.textContent='DRAG ON';btn.style.background='#ff0';btn.style.color='#000';
      getOverlays().forEach(el=>el.classList.add('draggable'));
    }else{
      btn.textContent='DRAG OFF';btn.style.background='#555';btn.style.color='#fff';
      getOverlays().forEach(el=>el.classList.remove('draggable'));
    }
  }

  function getOverlayKey(el){
    // Use the most specific sb- class (e.g. sb-num-bal, sb-click-spin) as unique key
    const classes=Array.from(el.classList);
    // Prefer the longest sb- class (most specific), excluding 'draggable'
    const sbClasses=classes.filter(c=>c.startsWith('sb-')&&c!=='sb-num'&&c!=='sb-click');
    if(sbClasses.length>0) return sbClasses[0];
    // Fallback to id
    if(el.id) return el.id;
    // Last resort: generic sb- class
    return classes.find(c=>c.startsWith('sb-'))||'';
  }

  function saveOverlayPositions(){
    const data={};
    getOverlays().forEach(el=>{
      const id=getOverlayKey(el);
      if(!id)return;
      data[id]={
        left:el.style.left||getComputedStyle(el).left,
        top:el.style.top||getComputedStyle(el).top,
        width:el.style.width||'',
        height:el.style.height||'',
        fontSize:el.style.fontSize||''
      };
    });
    localStorage.setItem(DRAG_KEY,JSON.stringify(data));
    const btn=document.getElementById('dragSaveBtn');
    if(btn){btn.textContent='SAVED!';btn.style.background='#0f0';
      setTimeout(()=>{btn.textContent='SALVA POS';btn.style.background='#0a0'},1000)}
  }

  function loadOverlayPositions(){
    const raw=localStorage.getItem(DRAG_KEY);
    if(!raw)return;
    let data;try{data=JSON.parse(raw)}catch(e){return}
    getOverlays().forEach(el=>{
      const id=getOverlayKey(el);
      if(!id||!data[id])return;
      const d=data[id];
      if(d.left)el.style.left=d.left;
      if(d.top)el.style.top=d.top;
      if(d.width)el.style.width=d.width;
      if(d.height)el.style.height=d.height;
      if(d.fontSize)el.style.fontSize=d.fontSize;
    });
  }

  function resetOverlayPositions(){
    if(!confirm('Reset posizioni overlay?'))return;
    localStorage.removeItem(DRAG_KEY);
    location.reload();
  }

  function exportPositions(){
    const lines=['/* Overlay positions */'];
    getOverlays().forEach(el=>{
      const cls=getOverlayKey(el);
      const cs=getComputedStyle(el);
      lines.push(`.${cls}{left:${el.style.left||cs.left};top:${el.style.top||cs.top};width:${el.style.width||cs.width};height:${el.style.height||cs.height}}`);
    });
    const txt=lines.join('\n');
    navigator.clipboard.writeText(txt).then(()=>alert('Posizioni copiate!')).catch(()=>alert(txt));
  }

  // Mouse drag + resize handlers
  let resizeTarget=null, resizeDir='', resizeStartX=0, resizeStartY=0, resizeStartW=0, resizeStartH=0;

  document.addEventListener('mousedown',function(e){
    if(!dragMode||e.button!==0)return;

    // Check if clicking a resize handle
    const handle=e.target.closest('.ov-handle');
    if(handle){
      e.preventDefault();e.stopPropagation();
      resizeTarget=handle.parentElement;
      parentRect=resizeTarget.parentElement.getBoundingClientRect();
      resizeStartX=e.clientX;
      resizeStartY=e.clientY;
      const cs=getComputedStyle(resizeTarget);
      resizeStartW=parseFloat(cs.width)/parentRect.width*100;
      resizeStartH=parseFloat(cs.height)/parentRect.height*100;
      if(handle.classList.contains('ov-handle-e'))resizeDir='e';
      else if(handle.classList.contains('ov-handle-s'))resizeDir='s';
      else resizeDir='se';
      return;
    }

    const el=e.target.closest('.draggable');
    if(!el)return;
    e.preventDefault();e.stopPropagation();
    dragTarget=el;
    parentRect=el.parentElement.getBoundingClientRect();
    dragStartX=e.clientX;
    dragStartY=e.clientY;
    const cs=getComputedStyle(el);
    elStartLeft=parseFloat(cs.left)/parentRect.width*100;
    elStartTop=parseFloat(cs.top)/parentRect.height*100;
  },true);

  document.addEventListener('mousemove',function(e){
    // Resize
    if(resizeTarget&&parentRect){
      const dx=e.clientX-resizeStartX;
      const dy=e.clientY-resizeStartY;
      if(resizeDir==='e'||resizeDir==='se'){
        resizeTarget.style.width=Math.max(0.5,resizeStartW+dx/parentRect.width*100).toFixed(1)+'%';
      }
      if(resizeDir==='s'||resizeDir==='se'){
        resizeTarget.style.height=Math.max(0.3,resizeStartH+dy/parentRect.height*100).toFixed(1)+'%';
      }
      return;
    }
    // Drag
    if(!dragTarget||!parentRect)return;
    const dx=e.clientX-dragStartX;
    const dy=e.clientY-dragStartY;
    const newLeft=elStartLeft+(dx/parentRect.width*100);
    const newTop=elStartTop+(dy/parentRect.height*100);
    dragTarget.style.left=newLeft.toFixed(1)+'%';
    dragTarget.style.top=newTop.toFixed(1)+'%';
  });

  document.addEventListener('mouseup',function(){
    dragTarget=null;resizeTarget=null;parentRect=null;resizeDir='';
  });

  // Shift+scroll: change font size
  document.addEventListener('wheel',function(e){
    if(!dragMode||!e.shiftKey)return;
    const el=e.target.closest('.draggable');
    if(!el)return;
    e.preventDefault();
    const curFS=parseFloat(getComputedStyle(el).fontSize)||11;
    el.style.fontSize=Math.max(4,curFS+(e.deltaY>0?-1:1))+'px';
  },{passive:false});

  // Build drag control panel (small bar at bottom)
  const bar=document.createElement('div');
  bar.innerHTML=`
