  // ===== SHARED SIM HELPERS =====
  const _symKeys=Object.keys(S).filter(s=>s!=='wild'&&s!=='scatter');
  const _simBet=1;

  function _simRnd(){
    let r=Math.random()*WT;
    for(const[s,w]of Object.entries(W)){r-=w;if(r<=0)return s;}
    return'celticKnot';
  }
  function _simGrid(){
    const gr=[];
    for(let c=0;c<COLS;c++){gr[c]=[];for(let r=0;r<ROWS;r++)gr[c][r]=_simRnd();}
    return gr;
  }
  function _simClusters(gr){
    const cls=[];const used=new Set();
    for(const st of _symKeys){
      const vis=Array.from({length:COLS},()=>Array(ROWS).fill(false));
      for(let c=0;c<COLS;c++){for(let r=0;r<ROWS;r++){
        if(vis[c][r])continue;
        const cs=gr[c][r];
        if(cs!==st&&cs!=='wild')continue;
        const cl=[],q=[{c,r}];vis[c][r]=true;
        while(q.length){const p=q.shift();cl.push(p);
          for(const[dc,dr]of[[-1,0],[1,0],[0,-1],[0,1]]){
            const nc=p.c+dc,nr=p.r+dr;
            if(nc>=0&&nc<COLS&&nr>=0&&nr<ROWS&&!vis[nc][nr]){
              const ns=gr[nc][nr];
              if(ns===st||ns==='wild'){vis[nc][nr]=true;q.push({c:nc,r:nr})}
            }
          }
        }
        const nonWild=cl.filter(p=>gr[p.c][p.r]!=='wild');
        if(cl.length>=5&&nonWild.length>=1){
          const hasNew=nonWild.some(p=>!used.has(p.c+','+p.r));
          if(hasNew){for(const p of nonWild)used.add(p.c+','+p.r);cls.push({sym:st,cells:cl})}
        }
      }}
    }
    return cls;
  }
  function _simCalcWin(cls,multi){
    let t=0;
    for(const cl of cls){const ti=getTierIdx(cl.cells.length);if(ti<0)continue;t+=(S[cl.sym]?.tiers?.[ti]||0)*_simBet*multi;}
    return t;
  }
  function _simCascade(gr,ch,stats){
    let totalW=0,n=0;
    let cls=_simClusters(gr);
    while(cls.length>0&&n<20){
      n++;const w=_simCalcWin(cls,ch.multi);totalW+=w;
      const clSet=new Set();const wps=[];
      for(const cl of cls){
        const hw=cl.cells.some(p=>gr[p.c][p.r]==='wild');
        if(!hw&&CFG.wildPerCluster){const wp=cl.cells[Math.floor(Math.random()*cl.cells.length)];wps.push(wp)}
        for(const p of cl.cells)clSet.add(p.c+','+p.r);
      }
      const ws=new Set(wps.map(p=>p.c+','+p.r));
      ch.points=Math.min(CFG.chargeMax,ch.points+clSet.size);
      for(let c=0;c<COLS;c++){
        const rem=[];for(let r=ROWS-1;r>=0;r--){if(clSet.has(c+','+r)&&!ws.has(c+','+r))rem.push(r)}
        rem.sort((a,b)=>b-a);for(const r of rem)gr[c].splice(r,1);
        for(let i=0;i<rem.length;i++)gr[c].unshift(_simRnd());
      }
      for(const wp of wps)gr[wp.c][wp.r]='wild';
      cls=_simClusters(gr);
    }
    if(stats)stats.cascades+=n;
    return totalW;
  }
  // Individual ability simulators
  function _simAbilRemove(gr){
    const count=CFG.removeSymMin+Math.floor(Math.random()*(CFG.removeSymMax-CFG.removeSymMin+1));
    const shuffled=[..._symKeys].sort(()=>Math.random()-0.5).slice(0,count);
    for(let c=0;c<COLS;c++){
      const rem=[];for(let r=ROWS-1;r>=0;r--){if(shuffled.includes(gr[c][r]))rem.push(r)}
      rem.sort((a,b)=>b-a);for(const r of rem)gr[c].splice(r,1);
      for(let i=0;i<rem.length;i++)gr[c].unshift(_simRnd());
    }
  }
  function _simAbilTransform(gr){
    const src=_symKeys[Math.floor(Math.random()*_symKeys.length)];
    const tgt=_symKeys.filter(s=>s!==src)[Math.floor(Math.random()*(_symKeys.length-1))];
    for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++){if(gr[c][r]===src)gr[c][r]=tgt}
  }
  function _simPickFbMulti(){
    const ms=CFG.fireballMultis;
    const totalW=ms.reduce((a,m)=>a+m.w,0);
    let rn=Math.random()*totalW,cum=0;
    for(const m of ms){cum+=m.w;if(rn<cum)return m.v;}
    return ms[0].v;
  }
  function _simPickRsMulti(){
    const ms=CFG.removeSymMultis;
    const totalW=ms.reduce((a,m)=>a+m.w,0);
    let rn=Math.random()*totalW,cum=0;
    for(const m of ms){cum+=m.w;if(rn<cum)return m.v;}
    return ms[0].v;
  }
  function _simPickFbCount(){
    const cs=CFG.fireballCounts.filter(c=>c.w>0);
    if(cs.length===0)return CFG.fireballMin;
    const totalW=cs.reduce((a,c)=>a+c.w,0);
    let rn=Math.random()*totalW,cum=0;
    for(const c of cs){cum+=c.w;if(rn<cum)return c.n;}
    return cs[0].n;
  }
  function _simAbilFireball(gr){
    const n=_simPickFbCount();
    let totalMulti=0;
    const used=new Set();
    for(let f=0;f<n;f++){
      // Avoid duplicate positions (same as gameplay)
      let tc,tr,att=0;
      do{
        tc=Math.floor(Math.random()*COLS);tr=Math.floor(Math.random()*ROWS);att++;
      }while((gr[tc][tr]==='wild'||gr[tc][tr]==='scatter'||used.has(tc+','+tr))&&att<30);
      if(used.has(tc+','+tr))continue;
      const ts=gr[tc][tr];if(ts==='wild'||ts==='scatter')continue;
      used.add(tc+','+tr);
      const m=_simPickFbMulti();
      if(m>1)totalMulti+=m; // 1x = nessun moltiplicatore
      for(const[dc,dr]of[[-1,0],[1,0],[0,-1],[0,1]]){
        const nc=tc+dc,nr=tr+dr;
        if(nc>=0&&nc<COLS&&nr>=0&&nr<ROWS&&gr[nc][nr]!=='wild'&&gr[nc][nr]!=='scatter')gr[nc][nr]=ts;
      }
    }
    return totalMulti||1; // se tutte 1x, ritorna 1 (nessun bonus)
  }
  function _simAbilBigDrop(gr){
    const sym=_symKeys[Math.floor(Math.random()*_symKeys.length)];
    const sz=Math.random()<CFG.bigDrop3x3Chance?3:2;
    const c=Math.floor(Math.random()*(COLS-sz+1)),r=Math.floor(Math.random()*(ROWS-sz+1));
    for(let dc=0;dc<sz;dc++)for(let dr=0;dr<sz;dr++)gr[c+dc][r+dr]=sym;
  }
  function _simAbilWildTransform(gr){
    const chosen=_symKeys[Math.floor(Math.random()*_symKeys.length)];
    for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++){if(gr[c][r]===chosen)gr[c][r]='wild'}
  }
  function _simPlaceBig(gr){
    if(Math.random()<CFG.bigSym3x3Chance){
      const sym=_symKeys[Math.floor(Math.random()*_symKeys.length)];
      const c=Math.floor(Math.random()*(COLS-2)),r=Math.floor(Math.random()*(ROWS-2));
      for(let dc=0;dc<3;dc++)for(let dr=0;dr<3;dr++)gr[c+dc][r+dr]=sym;
    }
    if(Math.random()<CFG.bigSym2x2Chance){
      const sym=_symKeys[Math.floor(Math.random()*_symKeys.length)];
      const c=Math.floor(Math.random()*(COLS-1)),r=Math.floor(Math.random()*(ROWS-1));
      for(let dc=0;dc<2;dc++)for(let dr=0;dr<2;dr++)gr[c+dc][r+dr]=sym;
    }
  }

  function _simChargeAbilities(gr,ch,stats,forceAbility,externalFbMulti){
    let pay=0;const ths=[CFG.chargeTh1,CFG.chargeTh2,CFG.chargeTh3];const trig=new Set();

    let _fbMulti=externalFbMulti||1; // fireball multiplier for current ability round
    let _firstAbility=true;
    function pickAndRunAbility(thLabel){
      _fbMulti=_firstAbility?(externalFbMulti||1):1;
      _firstAbility=false;
      if(forceAbility){const r=forceAbility(gr);if(typeof r==='number'&&r>1)_fbMulti=r;return}
      const pool=[];
      pool.push({fn:_simAbilRemove,key:'removesym'});
      if(CFG.transformEnabled)pool.push({fn:_simAbilTransform,key:'transform'});
      pool.push({fn:_simAbilFireball,key:'fireball'});
      pool.push({fn:_simAbilBigDrop,key:'bigdrop'});
      const pick=pool[Math.floor(Math.random()*pool.length)];
      const result=pick.fn(gr);
      if(pick.key==='fireball'&&typeof result==='number'&&result>1)_fbMulti=result;
      if(stats){
        if(!stats.abilDetail)stats.abilDetail={};
        const k=thLabel+'_'+pick.key;
        stats.abilDetail[k]=(stats.abilDetail[k]||{count:0,pay:0});
        stats.abilDetail[k].count++;
        stats._lastAbilKey=k;
      }
    }

    function check(){
      for(let i=0;i<ths.length;i++){
        const th=ths[i];
        if(ch.points>=th&&!trig.has(th)){
          trig.add(th);if(stats)stats.abilities++;
          const thLabel='th'+(i+1);
          if(stats){
            stats['th'+(i+1)+'_count']=(stats['th'+(i+1)+'_count']||0)+1;
          }
          pickAndRunAbility(thLabel);
          const cascPay=_simCascade(gr,ch,stats)*_fbMulti;_fbMulti=1;
          pay+=cascPay;
          if(stats){
            stats['th'+(i+1)+'_pay']=(stats['th'+(i+1)+'_pay']||0)+cascPay;
            if(stats._lastAbilKey&&stats.abilDetail[stats._lastAbilKey]){
              stats.abilDetail[stats._lastAbilKey].pay+=cascPay;
            }
          }
          check();return;
        }
      }
      if(ch.points>=CFG.chargeTh4&&!trig.has(CFG.chargeTh4)){
        trig.add(CFG.chargeTh4);if(stats)stats.abilities++;
        if(stats){
          stats.th4_count=(stats.th4_count||0)+1;
          if(!stats.abilDetail)stats.abilDetail={};
          const k='th4_wildtransform';
          stats.abilDetail[k]=(stats.abilDetail[k]||{count:0,pay:0});
          stats.abilDetail[k].count++;
          stats._lastAbilKey=k;
        }
        _simAbilWildTransform(gr);
        ch.points-=CFG.chargeMax;ch.multi+=CFG.chargeMultiStep;trig.clear();
        const cascPay=_simCascade(gr,ch,stats);
        pay+=cascPay;
        if(stats){
          stats.th4_pay=(stats.th4_pay||0)+cascPay;
          if(stats._lastAbilKey&&stats.abilDetail[stats._lastAbilKey]){
            stats.abilDetail[stats._lastAbilKey].pay+=cascPay;
          }
        }
        check();
      }
    }
    check();return pay;
  }

  function _simFullSpin(opts,stats){
    opts=opts||{};
    const gr=_simGrid();
    if(opts.bigSym!==false)_simPlaceBig(gr);

    const ch={points:0,multi:1};
    let cascadePay=0, chargePay=0;

    if(opts.preAbility){opts.preAbility(gr)}

    cascadePay=_simCascade(gr,ch,stats);
    if(stats){stats.cascadePay=(stats.cascadePay||0)+cascadePay}
    if(opts.charge!==false&&ch.points>=CFG.chargeTh1){
      chargePay=_simChargeAbilities(gr,ch,stats,opts.forceAbilityFn||null);
      if(stats)stats.chargePay=(stats.chargePay||0)+chargePay;
    }

    let scatN=0;
    for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++)if(gr[c][r]==='scatter')scatN++;
    return{pay:cascadePay+chargePay,scatN};
  }

            const sym=_symKeys[Math.floor(Math.random()*_symKeys.length)];
            const sz=Math.random()<CFG.bigDrop3x3Chance?3:2;
            const c=Math.floor(Math.random()*(COLS-sz+1)),r=Math.floor(Math.random()*(ROWS-sz+1));
            for(let dc=0;dc<sz;dc++)for(let dr=0;dr<sz;dr++)gr[c+dc][r+dr]=sym;
          }
          const ch={points:0,multi:1};
          pay=_simCascade(gr,ch,stats);
          if(ch.points>=CFG.chargeTh1)pay+=_simChargeAbilities(gr,ch,stats);
          let scatN=0;
          for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++)if(gr[c][r]==='scatter')scatN++;
          if(scatN>=CFG.scatterForFS){
            let fsLeft=scatN===3?CFG.fsSpins:scatN===4?CFG.fsSpins4:CFG.fsSpins5;
            while(fsLeft>0){fsLeft--;stats.fsTotalSpins++;
              const fr=_simFullSpin({},stats);pay+=fr.pay;
              if(fr.scatN>=CFG.scatterForFS){fsLeft+=CFG.fsRetriggerExtra;stats.fsRetriggers++;}
            }
          }

        }else if(feat==='buyFSFull'){
          let fsLeft=CFG.fsFullSpins;
          // Persistent charge state across all FS spins (like gameplay)
          const ch={points:CFG.fsFullChargeStart,multi:CFG.chargeMultiStart+CFG.fsFullMultiBonus*CFG.chargeMultiStep};
          while(fsLeft>0){fsLeft--;stats.fsTotalSpins++;
            const gr=_simGrid();
            if(Math.random()<CFG.fsFullBig3x3Chance){
              const sym=_symKeys[Math.floor(Math.random()*_symKeys.length)];
              const c=Math.floor(Math.random()*(COLS-2)),r=Math.floor(Math.random()*(ROWS-2));
              for(let dc=0;dc<3;dc++)for(let dr=0;dr<3;dr++)gr[c+dc][r+dr]=sym;
            }
            if(Math.random()<CFG.fsFullBig2x2Chance){
              const sym=_symKeys[Math.floor(Math.random()*_symKeys.length)];
              const c=Math.floor(Math.random()*(COLS-1)),r=Math.floor(Math.random()*(ROWS-1));
              for(let dc=0;dc<2;dc++)for(let dr=0;dr<2;dr++)gr[c+dc][r+dr]=sym;
            }
            const cascPay=_simCascade(gr,ch,stats);
            const chargePay=_simChargeAbilities(gr,ch,stats);
            pay+=cascPay+chargePay;
            let scatN=0;
            for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++)if(gr[c][r]==='scatter')scatN++;
            if(scatN>=CFG.scatterForFS){fsLeft+=CFG.fsFullRetriggerExtra;stats.fsRetriggers++;}
          }

        }else if(feat==='buyFSAuto'){
          let fsLeft=CFG.fsAutoSpins;
          // Persistent charge state across all FS spins (like gameplay)
          const ch={points:CFG.fsAutoChargeStart,multi:CFG.chargeMultiStart+CFG.fsAutoMultiBonus*CFG.chargeMultiStep};
          while(fsLeft>0){fsLeft--;stats.fsTotalSpins++;
            const gr=_simGrid();
            if(Math.random()<CFG.fsAutoBig3x3Chance){
              const sym=_symKeys[Math.floor(Math.random()*_symKeys.length)];
              const c=Math.floor(Math.random()*(COLS-2)),r=Math.floor(Math.random()*(ROWS-2));
              for(let dc=0;dc<3;dc++)for(let dr=0;dr<3;dr++)gr[c+dc][r+dr]=sym;
            }
            if(Math.random()<CFG.fsAutoBig2x2Chance){
              const sym=_symKeys[Math.floor(Math.random()*_symKeys.length)];
              const c=Math.floor(Math.random()*(COLS-1)),r=Math.floor(Math.random()*(ROWS-1));
              for(let dc=0;dc<2;dc++)for(let dr=0;dr<2;dr++)gr[c+dc][r+dr]=sym;
            }
            _simAbilWildTransform(gr);
            const cascPay=_simCascade(gr,ch,stats);
            const chargePay=_simChargeAbilities(gr,ch,stats);
            pay+=cascPay+chargePay;
            let scatN=0;
            for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++)if(gr[c][r]==='scatter')scatN++;
            if(scatN>=CFG.scatterForFS){fsLeft+=CFG.fsAutoRetriggerExtra;stats.fsRetriggers++;}
          }
        }

        // Apply max win cap
        if(CFG.maxWinMultiplier>0&&pay>CFG.maxWinMultiplier*_simBet)pay=CFG.maxWinMultiplier*_simBet;
        totalWon+=pay;
        if(pay>0)wins++;
        if(pay>maxWin)maxWin=pay;
      }

      const avgWin=(totalWon/N).toFixed(4);
      const rtp=(totalWon/totalSpent*100).toFixed(2);
      const hitRate=(wins/N*100).toFixed(1);
      const avgPerBuy=(totalWon/N).toFixed(2);
      const profitLoss=(totalWon-totalSpent).toFixed(2);
      const isFS=feat==='buyFSFull'||feat==='buyFSAuto';

      let extra='';
      if(isFS){
        const avgSpins=(stats.fsTotalSpins/N).toFixed(1);
        const retrigs=(stats.fsRetriggers/N*100).toFixed(2);
        extra=`<tr><td style="padding:2px 4px">Spin FS medi per sessione</td><td style="color:#FFD700;text-align:right">${avgSpins}</td></tr>
               <tr><td style="padding:2px 4px">Retrigger rate</td><td style="color:#4dff88;text-align:right">${retrigs}%</td></tr>`;
      }
      if(stats.cascadePay>0||stats.chargePay>0){
        extra+=`<tr><td style="padding:2px 4px">Vincite da cascade</td><td style="text-align:right">${stats.cascadePay.toFixed(2)}</td></tr>
                <tr><td style="padding:2px 4px">Vincite da charge bar</td><td style="color:#FFD700;text-align:right">${stats.chargePay.toFixed(2)}</td></tr>`;
      }

      let abilRows='';
      const ad=stats.abilDetail;
      for(const key of Object.keys(ad).sort()){
        const d=ad[key];
        abilRows+=`<tr><td style="padding:1px 6px;color:#aaa;font-size:9px">${key}</td><td style="text-align:right;font-size:9px">${d.count}x</td><td style="text-align:right;font-size:9px;color:#4dff88">${d.pay.toFixed(2)}</td></tr>`;
      }

      const col=parseFloat(rtp)>=100?'#4dff88':parseFloat(rtp)>=80?'#FFD700':'#ff4444';

      if(res)res.innerHTML=`
        <div style="color:#FFD700;font-size:13px;font-weight:bold;margin-bottom:4px">${labels[feat]||feat} \u2014 ${N.toLocaleString()} acquisti</div>
        <table style="font-size:10px;color:#aaa;border-collapse:collapse;width:100%">
          <tr><td style="padding:2px 4px;font-weight:bold">COSTO per acquisto</td><td style="color:#ff6666;text-align:right;font-weight:bold">${cost}x bet</td></tr>
          <tr><td style="padding:2px 4px;font-weight:bold">TOTALE SPESO</td><td style="color:#ff6666;text-align:right;font-weight:bold">${totalSpent.toFixed(2)}</td></tr>
          <tr><td style="padding:2px 4px;font-weight:bold">TOTALE VINTO</td><td style="color:#4dff88;text-align:right;font-weight:bold">${totalWon.toFixed(2)}</td></tr>
          <tr><td style="padding:2px 4px;font-weight:bold">RTP BUY BONUS</td><td style="color:${col};text-align:right;font-weight:bold;font-size:12px">${rtp}%</td></tr>
          <tr><td colspan="2" style="border-top:1px solid #444;padding-top:4px"></td></tr>
          <tr><td style="padding:2px 4px">Vincita media per acquisto</td><td style="text-align:right">${avgPerBuy}x</td></tr>
          <tr><td style="padding:2px 4px">Max singola vincita</td><td style="color:#FFD700;text-align:right">${maxWin.toFixed(2)}x</td></tr>
          <tr><td style="padding:2px 4px">Hit rate (vincita > 0)</td><td style="text-align:right">${hitRate}%</td></tr>
          <tr><td style="padding:2px 4px">Profitto/Perdita</td><td style="color:${parseFloat(profitLoss)>=0?'#4dff88':'#ff4444'};text-align:right;font-weight:bold">${profitLoss}</td></tr>
          ${extra}
        </table>
        ${abilRows?`<div style="margin-top:4px;color:#FFD700;font-size:10px;font-weight:bold">Dettaglio abilit\u00e0:</div>
        <table style="font-size:9px;color:#aaa;border-collapse:collapse;width:100%">
          <tr style="color:#888"><td style="padding:1px 6px">Tipo</td><td style="text-align:right">Attivazioni</td><td style="text-align:right">Pagato</td></tr>
          ${abilRows}
        </table>`:''}
        <div style="color:#888;font-size:9px;margin-top:4px">Simula l'acquisto del bonus con costo ${cost}x bet. RTP = totale vinto / totale speso.</div>`;
    },50);
  };

  window._simAllBuyFunctions=function(){
    const features=['findBonus','removeSymbols','fireballs','bigSymbols','buyFSFull','buyFSAuto'];
    const res=document.getElementById('rtpBuyResult');
    if(res)res.innerHTML='<span style="color:#FFD700">Simulazione tutte le funzioni in corso...</span>';
    setTimeout(()=>{
      const N=parseInt(document.getElementById('featSimNBuy')?.value||document.getElementById('featSimN')?.value||10000);
      const results=[];
      for(const feat of features){
        const cost=buyCosts[feat]||1;
        let totalSpent=0,totalWon=0,wins=0,maxWin=0;
        for(let i=0;i<N;i++){
          totalSpent+=cost*_simBet;
          let pay=0;
          if(feat==='findBonus'){
            const origW=W.scatter||CFG.scatterWeight;
            const boostedW=origW*2;
            const gr=[];
            const tmpWT=WT-origW+boostedW;
            for(let c=0;c<COLS;c++){gr[c]=[];for(let r=0;r<ROWS;r++){
              let rn=Math.random()*tmpWT,cum=0;let picked='celticKnot';
              for(const k of Object.keys(W)){
                const w=(k==='scatter')?boostedW:W[k];
                cum+=w;if(rn<cum){picked=k;break;}
              }
              gr[c][r]=picked;
            }}
            _simPlaceBig(gr);
            const ch={points:0,multi:1};
            pay=_simCascade(gr,ch,{cascades:0});
          }else if(feat==='removeSymbols'){
            const rsM=_simPickRsMulti();
            const gr=_simGrid();_simPlaceBig(gr);
            _simAbilRemove(gr);
            const ch={points:0,multi:1};
            pay=_simCascade(gr,ch,{cascades:0})*rsM;
          }else if(feat==='fireballs'){
            const gr=_simGrid();_simPlaceBig(gr);
            const fbM=_simAbilFireball(gr);
            const ch={points:0,multi:1};
            pay=_simCascade(gr,ch,{cascades:0})*fbM;
            if(ch.points>=CFG.chargeTh1)pay+=_simChargeAbilities(gr,ch,{cascades:0},null,fbM);
          }else if(feat==='bigSymbols'){
            const gr=_simGrid();
            const numBig=CFG.bigSymBuyMin+Math.floor(Math.random()*2);
            for(let b=0;b<numBig;b++){
              const sym=_symKeys[Math.floor(Math.random()*_symKeys.length)];
              const sz=Math.random()<CFG.bigDrop3x3Chance?3:2;
              const c=Math.floor(Math.random()*(COLS-sz+1)),r=Math.floor(Math.random()*(ROWS-sz+1));
              for(let dc=0;dc<sz;dc++)for(let dr=0;dr<sz;dr++)gr[c+dc][r+dr]=sym;
            }
            const ch={points:0,multi:1};
            pay=_simCascade(gr,ch,{cascades:0});
          }else if(feat==='buyFSFull'){
            let fsLeft=CFG.fsFullSpins;
            const ch={points:CFG.fsFullChargeStart,multi:CFG.chargeMultiStart+CFG.fsFullMultiBonus*CFG.chargeMultiStep};
            while(fsLeft>0){fsLeft--;
              const gr=_simGrid();
              if(Math.random()<CFG.fsFullBig3x3Chance){const sym=_symKeys[Math.floor(Math.random()*_symKeys.length)];const c=Math.floor(Math.random()*(COLS-2)),r=Math.floor(Math.random()*(ROWS-2));for(let dc=0;dc<3;dc++)for(let dr=0;dr<3;dr++)gr[c+dc][r+dr]=sym;}
              if(Math.random()<CFG.fsFullBig2x2Chance){const sym=_symKeys[Math.floor(Math.random()*_symKeys.length)];const c=Math.floor(Math.random()*(COLS-1)),r=Math.floor(Math.random()*(ROWS-1));for(let dc=0;dc<2;dc++)for(let dr=0;dr<2;dr++)gr[c+dc][r+dr]=sym;}
              pay+=_simCascade(gr,ch,{cascades:0});
              if(ch.points>=CFG.chargeTh1)pay+=_simChargeAbilities(gr,ch,{cascades:0});
            }
          }else if(feat==='buyFSAuto'){
            let fsLeft=CFG.fsAutoSpins;
            const ch={points:CFG.fsAutoChargeStart,multi:CFG.chargeMultiStart+CFG.fsAutoMultiBonus*CFG.chargeMultiStep};
            while(fsLeft>0){fsLeft--;
              const gr=_simGrid();
              if(Math.random()<CFG.fsAutoBig3x3Chance){const sym=_symKeys[Math.floor(Math.random()*_symKeys.length)];const c=Math.floor(Math.random()*(COLS-2)),r=Math.floor(Math.random()*(ROWS-2));for(let dc=0;dc<3;dc++)for(let dr=0;dr<3;dr++)gr[c+dc][r+dr]=sym;}
              if(Math.random()<CFG.fsAutoBig2x2Chance){const sym=_symKeys[Math.floor(Math.random()*_symKeys.length)];const c=Math.floor(Math.random()*(COLS-1)),r=Math.floor(Math.random()*(ROWS-1));for(let dc=0;dc<2;dc++)for(let dr=0;dr<2;dr++)gr[c+dc][r+dr]=sym;}
              _simAbilWildTransform(gr);
              pay+=_simCascade(gr,ch,{cascades:0});
              if(ch.points>=CFG.chargeTh1)pay+=_simChargeAbilities(gr,ch,{cascades:0});
            }
          }
          // Apply max win cap
          if(CFG.maxWinMultiplier>0&&pay>CFG.maxWinMultiplier*_simBet)pay=CFG.maxWinMultiplier*_simBet;
          totalWon+=pay;
          if(pay>0)wins++;
          if(pay>maxWin)maxWin=pay;
        }
        const rtp=(totalWon/totalSpent*100).toFixed(2);
        const hitRate=(wins/N*100).toFixed(1);
        const avgPerBuy=(totalWon/N).toFixed(2);
        results.push({feat,cost,rtp,hitRate,avgPerBuy,maxWin});
      }
      let html='<div style="color:#FFD700;font-size:12px;font-weight:bold;margin-bottom:6px">Comparazione tutte le funzioni comprate</div>';
      html+='<table style="font-size:10px;color:#aaa;border-collapse:collapse;width:100%">';
      html+='<tr style="border-bottom:1px solid #333"><td style="padding:2px 4px;font-weight:bold">Funzione</td><td style="text-align:right;color:#888;font-size:9px">Costo</td><td style="text-align:right;color:#888;font-size:9px">RTP</td><td style="text-align:right;color:#888;font-size:9px">Hit</td><td style="text-align:right;color:#888;font-size:9px">Avg Win</td></tr>';
      for(const r of results){
        const col=parseFloat(r.rtp)>=100?'#4dff88':parseFloat(r.rtp)>=80?'#FFD700':'#ff4444';
        html+=`<tr><td style="padding:2px 4px">${r.feat}</td><td style="text-align:right;color:#ff6666">${r.cost}x</td><td style="text-align:right;color:${col};font-weight:bold">${r.rtp}%</td><td style="text-align:right">${r.hitRate}%</td><td style="text-align:right">${r.avgPerBuy}x</td></tr>`;
      }
      html+='</table>';
      if(res)res.innerHTML=html;
    },50);
  };
})();

  // Open/close

})();
